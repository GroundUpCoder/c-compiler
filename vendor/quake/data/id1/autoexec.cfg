// Trackpad-friendly Quake controls. WASD for moving (left hand),
// arrow keys for turning/looking (right hand), space = fire,
// / = jump. No mouse required — works on any laptop trackpad.
//
// (Mouse owners: tap ` to open the console and run "+mlook" to turn
// on mouselook. Or rebind any key below to taste.)
//
// To get id's original keyboard defaults back: delete /id1/autoexec.cfg
// in OPFS (DevTools → Application → Storage → Clear), or rebuild
// with this file removed from bin.json.

// --- Mouse (optional, off by default for trackpad ergonomics) ---
m_pitch -0.022                    // non-inverted vertical (positive = invert)
m_yaw    0.022
sensitivity 6
cl_pitchspeed 150
cl_yawspeed 200                   // a bit faster than default 140 for keyboard turning

// --- Movement (left hand) ---
unbindall
bind w "+forward"
bind s "+back"
bind a "+moveleft"                // STRAFE, not turn
bind d "+moveright"
bind shift "+speed"               // hold to run
bind ctrl "+movedown"             // crouch / swim down
bind e "+moveup"                  // swim up

// --- Look / turn (right hand, arrow keys) ---
bind leftarrow  "+left"           // turn left
bind rightarrow "+right"          // turn right
bind uparrow    "+lookup"
bind downarrow  "+lookdown"
bind end        "centerview"      // recenter pitch (handy after looking up/down)

// --- Combat ---
bind space  "+attack"             // primary action: fire
bind /      "+jump"               // forward-slash jumps
bind mouse1 "+attack"             // mouse alternative (no-op on trackpad)
bind mouse2 "+jump"
bind r      "impulse 10"          // next weapon
bind q      "impulse 12"          // previous weapon
bind 1 "impulse 1"                // axe
bind 2 "impulse 2"                // shotgun
bind 3 "impulse 3"                // double-barrel shotgun
bind 4 "impulse 4"                // nailgun
bind 5 "impulse 5"                // super nailgun
bind 6 "impulse 6"                // grenade launcher
bind 7 "impulse 7"                // rocket launcher
bind 8 "impulse 8"                // thunderbolt

// --- UI / system ---
bind escape "togglemenu"
bind "`" "toggleconsole"          // backtick — Quake console
bind "~" "toggleconsole"
bind tab "+showscores"
bind f1 "help"
bind f5 "menu_save"
bind f9 "menu_load"
bind f12 "screenshot"
bind pause "pause"

// --- Misc niceties ---
// (Don't put `;` inside `//` comments below — Quake's Cbuf_Execute
//  splits commands on `;` BEFORE COM_Parse strips //, so a `;` in a
//  comment leaks the rest as a bogus command.)
crosshair 1
viewsize 100
