// Modern WASD + mouselook config. Runs after id1/default.cfg, so it
// overrides the 1996 keyboard-turning defaults with the layout that
// became the FPS standard partly because of Quake itself (Thresh's
// 1997 Ferrari-winning config did most of this by hand).
//
// To get id's original keyboard defaults back: delete /id1/autoexec.cfg
// in OPFS (DevTools → Application → Storage), or rebuild with this
// file removed from bin.json.

// --- Mouse ---
+mlook                            // permanently mouse-look (Y → pitch)
m_pitch -0.022                    // non-inverted vertical (positive = invert)
m_yaw    0.022
sensitivity 6
cl_pitchspeed 150

// --- Movement ---
unbindall
bind w "+forward"
bind s "+back"
bind a "+moveleft"                // STRAFE, not turn
bind d "+moveright"
bind space "+jump"
bind shift "+speed"               // hold to run (default cvar already 1.0)
bind ctrl "+movedown"             // crouch / swim down
bind e "+moveup"                  // swim up / jump-up underwater

// --- Combat ---
bind mouse1 "+attack"
bind mouse2 "+jump"               // alt-jump on right click (very useful)
bind r "impulse 10"               // next weapon
bind q "impulse 12"               // previous weapon
bind 1 "impulse 1"                // axe
bind 2 "impulse 2"                // shotgun
bind 3 "impulse 3"                // double-barrel shotgun
bind 4 "impulse 4"                // nailgun
bind 5 "impulse 5"                // super nailgun
bind 6 "impulse 6"                // grenade launcher
bind 7 "impulse 7"                // rocket launcher
bind 8 "impulse 8"                // thunderbolt

// --- UI / system ---
bind escape "togglemenu"
bind ` "toggleconsole"            // backtick — Quake console
bind ~ "toggleconsole"
bind tab "+showscores"
bind f1 "help"
bind f5 "menu_save"
bind f9 "menu_load"
bind f12 "screenshot"
bind pause "pause"

// --- Misc niceties ---
crosshair 1                       // show crosshair (default: off)
viewsize 100                      // hide the HUD bezel; full-screen view
