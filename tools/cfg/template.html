        const group = el('div', { class: 'fn-group' });
        group.appendChild(el('h3', {}, fn.name,
          el('span', { class: 'sub' },
            ' (' + fn.params.map(p => p.type).join(', ') + ') → ' + fn.returnType)));
        if (view === 'text') {
          group.appendChild(renderFnCfgTextC1(fn));
        } else {
          group.appendChild(renderFnCfgGraphC1(fn));
        }
        container.appendChild(group);
      }
    }
    toggle.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        toggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(btn.dataset.view);
      });
    });
    render('text');
  }

  // ── Locals ──
  function renderLocals(panel, trace) {
    panel.appendChild(el('div', { class: 'hint' },
      'Wasm runs on a stack-plus-locals model: each function has a fixed ' +
      'array of typed local slots (function parameters first, declared ' +
      'locals after). c0 allocates one local per source variable up front — ' +
      'the local index of `x` is fixed for the whole function, and every ' +
      'read/write becomes `local.get/set <that index>`. If the function ' +
      'contains a switch, one extra i32 scratch local is appended.'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'The allocation'));
    panel.appendChild(makeCatalog([
      { cat: 'fixed',     name: 'function params',
        desc: 'parameters.length entries at indices 0..N-1. Wasm puts them in the same slots as named locals — there\'s no separate "params" array in the encoded function body.' },
      { cat: 'allocated', name: 'Declare locals',
        desc: 'Every `T x = ...;` in the function body gets the next free local. Same slot persists for the lifetime of the function — c0 has no scoping for locals; you can\'t shadow.' },
      { cat: 'allocated', name: '$swScratch',
        desc: 'One extra i32 local appended if the function contains any switch statement. Holds the switch\'s value across the dispatch chain so it\'s not recomputed per-case.' },
    ]));

    panel.appendChild(el('div', { class: 'callout' },
      el('strong', {}, 'No SSA, no coalescing. '),
      'Every assignment to source-level `i` writes the same wasm local. ' +
      'The sibling c2 backend (SSA) gives each definition a fresh Value ' +
      'and routes joins through block parameters — typically inflating ' +
      'the local count, then giving an optimizer cleaner material to ' +
      'shrink it back down. c0 trades codegen quality (some redundant ' +
      'local.set pairs) for IR simplicity.'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'Source reference'));
    const src = makePhaseSourceBlock('c0-locals',
      'Derivation: layoutFor() — CODEGEN.emit\'s inner helper');
    if (src) panel.appendChild(src);

    panel.appendChild(el('h2', { class: 'section-title' }, 'Local allocation for the current source'));
    for (const fn of trace.ast.functions) {
      const layout = trace.fnTraces.get(fn.name);
      if (!layout) continue;
      const group = el('div', { class: 'fn-group' });
      const total = layout.params.length + layout.locals.length;
      group.appendChild(el('h3', {}, fn.name,
        el('span', { class: 'sub' }, '  (' + total + ' wasm locals total)')));
      const tbl = el('table', { class: 'kv' });
      tbl.appendChild(el('tr', {},
        el('th', {}, 'local'),
        el('th', {}, 'type'),
        el('th', {}, 'origin'),
        el('th', {}, 'name')));
      const rows = [...layout.params, ...layout.locals];
      for (const r of rows) {
        tbl.appendChild(el('tr', {},
          el('td', { class: 'num mono' }, String(r.idx)),
          el('td', { class: 'type mono' }, r.type),
          el('td', { class: 'mute' }, r.origin),
          el('td', { class: 'mono' }, r.name)));
      }
      group.appendChild(tbl);
      panel.appendChild(group);
    }
  }

  // ── wasm (module summary + per-function disasm) ──
  function fmtBytes(arr, max = 8) {
    let s = '';
    for (let i = 0; i < Math.min(arr.length, max); i++) {
      s += arr[i].toString(16).padStart(2, '0') + ' ';
    }
    if (arr.length > max) s += '…';
    return s.trim();
  }

  function renderModuleSummary(panel, trace) {
    const d = DISASM.disassemble(trace.bytes);
    const group = el('div', { class: 'fn-group' });
    group.appendChild(el('h3', {}, 'Module summary',
      el('span', { class: 'sub' }, '  ' + trace.bytes.length + ' bytes')));

    const secTable = el('table', { class: 'kv' });
    secTable.appendChild(el('tr', {},
      el('th', {}, 'section'),
      el('th', {}, 'id'),
      el('th', {}, 'size (B)')));
    for (const s of d.sections) {
      secTable.appendChild(el('tr', {},
        el('td', { class: 'kw mono' }, s.name),
        el('td', { class: 'num mono' }, String(s.id)),
        el('td', { class: 'num mono' }, String(s.length))));
    }
    group.appendChild(secTable);

    group.appendChild(el('h2', { class: 'section-title' }, 'Function types'));
    if (d.types.length === 0) {
      group.appendChild(el('div', { class: 'mute mono' }, '(none)'));
    } else {
      const tt = el('table', { class: 'kv' });
      tt.appendChild(el('tr', {},
        el('th', {}, 'idx'), el('th', {}, 'sig')));
      d.types.forEach((ty, i) => {
        tt.appendChild(el('tr', {},
          el('td', { class: 'num mono' }, String(i)),
          el('td', { class: 'mono' }, DISASM.typeToString(ty, i))));
      });
      group.appendChild(tt);
    }

    group.appendChild(el('h2', { class: 'section-title' }, 'Exports'));
    if (d.exports.length === 0) {
      group.appendChild(el('div', { class: 'mute mono' }, '(none)'));
    } else {
      const et = el('table', { class: 'kv' });
      et.appendChild(el('tr', {},
        el('th', {}, 'name'), el('th', {}, 'kind'), el('th', {}, 'idx')));
      for (const ex of d.exports) {
        et.appendChild(el('tr', {},
          el('td', { class: 'mono' }, ex.name),
          el('td', { class: 'mute' }, ex.kind),
          el('td', { class: 'num mono' }, String(ex.idx))));
      }
      group.appendChild(et);
    }
    panel.appendChild(group);
    return d;
  }

  // Lightweight body walker that tokenizes the raw bytes for display.
  function walkBodyDirect(u8) {
    const out = [];
    let p = 0;
    function uleb() {
      let r = 0n, s = 0n;
      while (true) {
        const b = u8[p++];
        r |= BigInt(b & 0x7F) << s;
        if ((b & 0x80) === 0) return Number(r);
        s += 7n;
      }
    }
    function sleb() {
      let r = 0n, s = 0n, b = 0;
      while (true) {
        b = u8[p++];
        r |= BigInt(b & 0x7F) << s;
        s += 7n;
        if ((b & 0x80) === 0) break;
      }
      if ((b & 0x40) !== 0) r |= -(1n << s);
      return r;
    }
    while (p < u8.length) {
      const start = p;
      const op = u8[p++];
      let entry;
      switch (op) {
        case 0x00: entry = { op: 'unreachable' }; break;
        case 0x01: entry = { op: 'nop' }; break;
        case 0x02: { const bt = u8[p++]; entry = { op: 'block', blockType: bt }; break; }
        case 0x03: { const bt = u8[p++]; entry = { op: 'loop',  blockType: bt }; break; }
        case 0x04: { const bt = u8[p++]; entry = { op: 'if',    blockType: bt }; break; }
        case 0x05: entry = { op: 'else' }; break;
        case 0x0B: entry = { op: 'end' }; break;
        case 0x0C: entry = { op: 'br', target: uleb() }; break;
        case 0x0D: entry = { op: 'br_if', target: uleb() }; break;
        case 0x0F: entry = { op: 'return' }; break;
        case 0x10: entry = { op: 'call', funcidx: uleb() }; break;
        case 0x20: entry = { op: 'local.get', idx: uleb() }; break;
        case 0x21: entry = { op: 'local.set', idx: uleb() }; break;
        case 0x22: entry = { op: 'local.tee', idx: uleb() }; break;
        case 0x41: entry = { op: 'i32.const', value: sleb() }; break;
        case 0x42: entry = { op: 'i64.const', value: sleb() }; break;
        case 0x43: { const v = u8.slice(p, p + 4); p += 4; entry = { op: 'f32.const', bytes: v }; break; }
        case 0x44: { const v = u8.slice(p, p + 8); p += 8; entry = { op: 'f64.const', bytes: v }; break; }
        case 0x45: entry = { op: 'i32.eqz' }; break;
        default:   entry = { op: _opcodeName(op) || ('op_0x' + op.toString(16)) };
      }
      entry.offset = start;
      entry.bytes = u8.slice(start, p);
      out.push(entry);
    }
    return out;
  }

  // Names for the arithmetic/compare opcodes c0.js emits.
  const _SINGLE_OP_NAMES = {
    0x46: 'i32.eq',  0x47: 'i32.ne',
    0x48: 'i32.lt_s',0x4A: 'i32.gt_s',
    0x4C: 'i32.le_s',0x4E: 'i32.ge_s',
    0x6A: 'i32.add', 0x6B: 'i32.sub', 0x6C: 'i32.mul',
    0x6D: 'i32.div_s', 0x6F: 'i32.rem_s',
    0x51: 'i64.eq',  0x52: 'i64.ne',
    0x53: 'i64.lt_s',0x55: 'i64.gt_s',
    0x57: 'i64.le_s',0x59: 'i64.ge_s',
    0x7C: 'i64.add', 0x7D: 'i64.sub', 0x7E: 'i64.mul',
    0x7F: 'i64.div_s', 0x81: 'i64.rem_s',
    0x5B: 'f32.eq',  0x5C: 'f32.ne',
    0x5D: 'f32.lt',  0x5E: 'f32.gt',
    0x5F: 'f32.le',  0x60: 'f32.ge',
    0x8C: 'f32.neg', 0x9A: 'f64.neg',
    0x92: 'f32.add', 0x93: 'f32.sub', 0x94: 'f32.mul', 0x95: 'f32.div',
    0x61: 'f64.eq',  0x62: 'f64.ne',
    0x63: 'f64.lt',  0x64: 'f64.gt',
    0x65: 'f64.le',  0x66: 'f64.ge',
    0xA0: 'f64.add', 0xA1: 'f64.sub', 0xA2: 'f64.mul', 0xA3: 'f64.div',
  };
  function _opcodeName(op) { return _SINGLE_OP_NAMES[op]; }

  function instAsmText(i) {
    if (i.op === 'i32.const' || i.op === 'i64.const') return `${i.op} ${i.value}`;
    if (i.op === 'f32.const' || i.op === 'f64.const') return `${i.op} <${i.bytes.length} bytes>`;
    if (i.op === 'local.get' || i.op === 'local.set' || i.op === 'local.tee') return `${i.op} ${i.idx}`;
    if (i.op === 'br' || i.op === 'br_if') return `${i.op} ${i.target}`;
    if (i.op === 'call') return `${i.op} ${i.funcidx}`;
    if (i.op === 'block' || i.op === 'loop' || i.op === 'if') {
      return `${i.op}${i.blockType === 0x40 ? '' : ' bt=0x' + i.blockType.toString(16)}`;
    }
    return i.op;
  }

  function renderFnDisasm(fnInfo) {
    const group = el('div', { class: 'fn-group' });
    group.appendChild(el('h3', {}, fnInfo.name,
      el('span', { class: 'sub' },
        '  body=' + fnInfo.body.length + 'B,  locals=' + fnInfo.extraTypes.length +
        ' (+' + fnInfo.paramTypes.length + ' params)')));

    if (fnInfo.extraTypes.length > 0) {
      const runs = [];
      for (const ty of fnInfo.extraTypes) {
        if (runs.length && runs[runs.length - 1].type === ty) runs[runs.length - 1].count++;
        else runs.push({ count: 1, type: ty });
      }
      const txt = '(' + runs.map(r => r.count + '×' + r.type).join(', ') + ')';
      group.appendChild(el('div', { class: 'mono mute', style: { marginBottom: '8px' } },
        'declared locals: ' + txt));
    }

    const insts = walkBodyDirect(fnInfo.body);
    let indent = 0;
    const lines = [];
    for (const i of insts) {
      if (i.op === 'end') indent = Math.max(0, indent - 1);
      lines.push({
        offset: i.offset,
        bytes: i.bytes,
        text: instAsmText(i),
        indent,
      });
      if (i.op === 'block' || i.op === 'loop' || i.op === 'if') indent++;
    }

    const dbox = el('div');
    for (const ln of lines) {
      const row = el('div', { class: 'disasm-line' });
      row.appendChild(el('div', { class: 'disasm-offset' },
        ln.offset.toString().padStart(4) + ':'));
      row.appendChild(el('div', { class: 'disasm-bytes' }, fmtBytes(ln.bytes)));
      row.appendChild(el('div', { class: 'disasm-asm' },
        '  '.repeat(ln.indent) + ln.text));
      dbox.appendChild(row);
    }
    group.appendChild(dbox);
    return group;
  }

  function renderAsm(panel, trace) {
    panel.appendChild(el('div', { class: 'hint' },
      'The final emit phase. The module header (magic + version) is followed ' +
      'by sections — each tagged with a numeric ID and length-prefixed. c0 ' +
      'emits the same four sections every time; everything else (memory, ' +
      'tables, globals, custom name section, …) is omitted.'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'Sections emitted'));
    panel.appendChild(makeCatalog([
      { cat: 'id=1',  name: 'type',     desc: 'Interned function signatures. Each function in the module references one entry by index.' },
      { cat: 'id=3',  name: 'function', desc: 'For each defined function, its type-section index.' },
      { cat: 'id=7',  name: 'export',   desc: 'Names visible to the host. Every function is exported under its source name.' },
      { cat: 'id=10', name: 'code',     desc: 'Per-function body: a run-length-encoded locals declaration followed by the body bytes (the emit phase\'s output) and a final 0x0B.' },
    ]));

    panel.appendChild(el('div', { class: 'callout' },
      el('strong', {}, 'The c0 emit walk. '),
      'c0\'s emitter is a direct AST → wasm walk — ',
      el('strong', {}, 'no CFG, no SSA, no analyses. '),
      'For each function: walk the AST body, emitting bytes as we go. ' +
      'Structured control (if/while/switch) maps directly onto wasm\'s ' +
      'native `block`/`loop`/`if`/`br`/`br_if`. The CFG.fromAST path ' +
      'exists for visualization and round-trip experiments but isn\'t in ' +
      'the hot compile path. Sources that use goto are first lifted via ' +
      'CFG.intoAST(CFG.fromAST(prog)) into a while-switch form, then ' +
      'emitted.'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'Source reference'));
    const src = makePhaseSourceBlock('c0-emit',
      'Derivation: CODEGEN.emit() — AST → wasm bytes');
    if (src) panel.appendChild(src);

    panel.appendChild(el('h2', { class: 'section-title' }, 'Compiled binary'));

    if (!trace.bytes) {
      panel.appendChild(el('div', { class: 'mute mono' },
        '(emit failed: ' + (trace.bytesError?.message || 'unknown') + ')'));
      return;
    }

    panel.appendChild(el('div', { class: 'hint muted' },
      'Indentation tracks block/loop/if nesting.'));
    const d = renderModuleSummary(panel, trace);
    // Map each disasm function to its body bytes + locals types.
    for (let i = 0; i < d.funcs.length; i++) {
      const fnD = d.funcs[i];
      const astFn = trace.ast.functions[i];
      panel.appendChild(renderFnDisasm({
        name: astFn ? astFn.name : ('fn[' + i + ']'),
        body: fnD.body,
        extraTypes: fnD.localGroups.flatMap(g => Array(g.count).fill(DISASM.valueTypeToString(g.type))),
        paramTypes: astFn ? astFn.parameters.map(p => p.type) : [],
      }));
    }
  }

  // ──────────── Pipeline (static explainer) ────────────

  const PHASES = [
    { key: 'lex', tabId: 'tokens', title: 'Lexer',
      sub: 'characters → tokens',
      summary:
        'Walks the source string left-to-right, producing a flat array of ' +
        'tokens. Each token carries its type tag, value, and source line/col. ' +
        'Whitespace and `//` comments are skipped; the lexer has at most ' +
        'one character of lookahead (for `==`, `!=`, `<=`, `>=`).',
      ioIn: 'source: string',
      ioOut: 'tokens: Token[]' },
    { key: 'parse', tabId: 'ast', title: 'Parser',
      sub: 'tokens → AST',
      summary:
        'Recursive descent over the token stream, with precedence-climbing for ' +
        'expressions. parseProgram yields an AST.Program of Functions; each ' +
        'Function has typed parameters and a Block body. Variables resolve ' +
        'into shared AST.Variable instances via a per-function scope map — ' +
        'the same instance appears at the declaration AND every reference.',
      ioIn: 'tokens: Token[]',
      ioOut: 'ast: AST.Program' },
    { key: 'c0-lower', tabId: 'cfg', title: 'Lower to CFG',
      sub: 'AST → statement-CFG',
      summary:
        'Walks each function with a "current block" cursor. Straight-line code ' +
        '(Assign + Declare-with-initializer) pushes AST.Assign nodes into the ' +
        'block as-is; control-flow constructs (If/While/Switch/Break/Return/' +
        'Goto) open fresh blocks and connect them with terminators. Labels are ' +
        'pre-allocated in a scan so forward gotos resolve.',
      ioIn: 'ast: AST.Program',
      ioOut: 'mod: CFG.Module' },
    { key: 'c0-lift', tabId: 'lifted', title: 'Lift CFG back to AST',
      sub: 'CFG → AST.Program (while-switch form)',
      summary:
        'Round-trips the CFG back into structured c0 source by emitting a ' +
        '`while (1) { switch (__state) { case ID: … } }` dispatcher per ' +
        'function. Each block\'s terminator becomes either a state-assignment ' +
        '+ break or a return. Useful for visualization AND for compiling goto-' +
        'based sources (which CODEGEN.emit rejects directly).',
      ioIn: 'mod: CFG.Module',
      ioOut: 'lifted: AST.Program' },
    { key: 'c0-locals', tabId: 'locals', title: 'Discover locals',
      sub: 'AST.Function → wasm local layout',
      summary:
        'Walk the AST once; for each function parameter and each Declare, ' +
        'assign a wasm local index. Flat scope: redeclaring a name anywhere ' +
        'in the function is an error. If the function contains a switch, an ' +
        'extra i32 scratch local is appended (used to stash the switch ' +
        'value across the dispatch chain). Runs inside CODEGEN.emit.',
      ioIn: 'astFn: AST.Function',
      ioOut: 'Map<varName, localIdx> + declared types[]' },
    { key: 'c0-emit', tabId: 'asm', title: 'Emit body bytes',
      sub: 'AST → wasm bytes (direct)',
      summary:
        'A direct AST → wasm walk per function. Structured control flow ' +
        '(if/while/switch) maps onto wasm\'s native block/loop/if/br/br_if ' +
        'instructions. Expressions emit recursively in stack-machine order: ' +
        'left, right, op-byte. Sources that use label/goto can\'t be emitted ' +
        'directly — they\'re first round-tripped through lower→lift.',
      ioIn: 'AST.Program',
      ioOut: 'bytes: Uint8Array' },
  ];

  function renderPipeline(panel, _trace) {
    if (BACKEND !== 'c0') {
      panel.appendChild(el('div', { class: 'hint' },
        'The Pipeline explainer covers the ',
        el('span', { class: 'mono' }, 'c0'),
        ' backend. The pipeline for ',
        el('span', { class: 'mono' }, BACKEND),
        ' (and its detail tabs) is not yet wired into the visualizer — ' +
        'switch the Backend selector back to c0 to read the explainer.'));
      return;
    }
    panel.appendChild(el('div', { class: 'hint' },
      'The full c0 compiler pipeline. Each stage maps to one detail tab; ' +
      'clicking a stage opens its detail tab in the pane opposite ' +
      'Pipeline\'s — so you can keep this explainer open while inspecting ' +
      'the live phase output side-by-side.'));

    const flow = el('div', { class: 'pipeline-flow' });
    const stages = [
      { label: 'source',     tabId: 'source'    },
      { label: 'tokens',     tabId: 'tokens'    },
      { label: 'AST',        tabId: 'ast'       },
      { label: 'CFG',        tabId: 'cfg'       },
      { label: 'Lifted AST', tabId: 'lifted'    },
      { label: 'locals',     tabId: 'locals'    },
      { label: 'wasm bytes', tabId: 'asm'       },
    ];
    stages.forEach((s, i) => {
      if (i > 0) flow.appendChild(el('span', { class: 'phase-arrow' }, '→'));
      const box = el('span', { class: 'phase-box', title: `Open ${s.label} detail in opposite pane` }, s.label);
      box.addEventListener('click', () => openInOppositePane(s.tabId));
      flow.appendChild(box);
    });
    panel.appendChild(flow);

    panel.appendChild(el('div', { class: 'callout' },
      el('strong', {}, 'Two emit paths. '),
      'The direct path (PARSER.parse → CODEGEN.emit) runs every keystroke ' +
      'for structured sources. The lift path (PARSER.parse → CFG.fromAST → ' +
      'CFG.intoAST → CODEGEN.emit) is what makes label/goto work — gotos ' +
      'can\'t be emitted directly, but after a round-trip through the CFG ' +
      'they come out as a structured while-switch dispatcher that emit ' +
      'accepts.'));

    for (const p of PHASES) {
      const card = el('div', { class: 'phase-card', 'data-phase': p.key });
      const head = el('div', { class: 'phase-card-head' });
      head.appendChild(el('h3', {}, p.title));
      if (p.tabId) {
        const btn = el('span', {
          class: 'openbtn',
          title: `Open the ${p.tabId} tab in opposite pane`,
        }, 'Open ' + p.tabId + ' ↗');
        btn.addEventListener('click', () => openInOppositePane(p.tabId));
        head.appendChild(btn);
      }
      card.appendChild(head);
      card.appendChild(el('div', { class: 'phase-sub' }, p.sub));
      card.appendChild(el('div', { class: 'phase-summary' }, p.summary));
      const io = el('div', { class: 'phase-io' });
      io.appendChild(el('span', { class: 'io-label' }, 'in'));
      io.appendChild(el('span', { class: 'io-shape' }, p.ioIn));
      io.appendChild(el('span', { class: 'io-arrow' }, '→'));
      io.appendChild(el('span', { class: 'io-label' }, 'out'));
      io.appendChild(el('span', { class: 'io-shape' }, p.ioOut));
      card.appendChild(io);
      const src = SNIPPETS_HTML[p.key];
      if (src) {
        const pre = el('pre', { class: 'phase-code' });
        pre.innerHTML = src;
        card.appendChild(pre);
      } else {
        card.appendChild(el('div', { class: 'mute mono' },
          `(snippet "${p.key}" not found in c0.js — re-run build.py)`));
      }
      panel.appendChild(card);
    }
  }

  // ──────────── tab registry ────────────

  TAB_DEFS.push(
    { id: 'pipeline',    label: 'Pipeline',      render: renderPipeline, static: true },
    { id: 'source',      label: 'Source',        render: null,           static: true },
    { id: 'tokens',      label: 'Tokens',        render: renderTokens },
    { id: 'ast',         label: 'AST',           render: renderAst },
    { id: 'cfg',         label: 'CFG',           render: renderCfg },
    { id: 'lifted',      label: 'Lifted',        render: renderLifted },
    { id: 'locals',      label: 'Locals',        render: renderLocals },
    { id: 'asm',         label: 'wasm',          render: renderAsm },
  );

  for (const def of TAB_DEFS) {
    const button = el('button',
      { 'data-tab': def.id, draggable: 'true' }, def.label);
    const panel = el('div', { class: 'panel', 'data-tab': def.id });
    button.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', def.id);
      e.dataTransfer.effectAllowed = 'move';
      button.classList.add('dragging');
    });
    button.addEventListener('dragend', () => button.classList.remove('dragging'));
    tabs.set(def.id, { button, panel, def });
  }

  // Source tab: the textarea + highlighted overlay + errors div live
  // inside this panel permanently (avoiding remount overhead). The whole
  // subtree moves between panes when the user drags the Source tab.
  {
    const srcPanel = tabs.get('source').panel;
    const tmpl = document.getElementById('source-boot');
    srcPanel.appendChild(tmpl.content.cloneNode(true));
  }

  // ──────────── backend state ────────────
  //
  // BACKENDS_AVAILABLE is set by build.py based on which cX.js files were
  // bundled. The header <select> is populated from it; the active one is
  // restored from localStorage when possible, else the first available.
  const BACKENDS_AVAILABLE = window.BACKENDS_AVAILABLE || ['c0'];
  let BACKEND = BACKENDS_AVAILABLE[0];
  function activeCompiler() {
    if (BACKEND === 'c0') return window.C0;
    if (BACKEND === 'c1') return window.C1;
    if (BACKEND === 'c2') return window.C2;
    return window.C0;
  }

  // ──────────── pane state + apply ────────────

  const PANE_EL = {
    paneA: document.getElementById('paneA'),
    paneB: document.getElementById('paneB'),
  };
  // Default layout: Pipeline + Source on the left (Pipeline active so the
  // user lands on the overview), every other tab on the right with Tokens
  // active. openInOppositePane targets the pane OPPOSITE to Pipeline's,
  // so Pipeline clicks open detail tabs on the right pane.
  const paneState = (() => {
    const leftIds = ['pipeline', 'source'];
    const rightIds = TAB_DEFS.map(d => d.id).filter(id => !leftIds.includes(id));
    return {
      paneA: { tabIds: leftIds, active: 'pipeline' },
      paneB: { tabIds: rightIds, active: rightIds[0] || null },
    };
  })();

  function applyPane(paneId) {
    const pane = PANE_EL[paneId];
    const state = paneState[paneId];
    const tabBar = pane.querySelector('.pane-tabs');
    const panelBox = pane.querySelector('.pane-panels');
    clear(tabBar);
    clear(panelBox);
    if (state.tabIds.length === 0) {
      pane.classList.add('empty');
      panelBox.appendChild(el('div', { class: 'empty-pane-hint' },
        'Drag a tab from the other pane here to split the view.'));
      return;
    }
    pane.classList.remove('empty');
    if (!state.tabIds.includes(state.active)) state.active = state.tabIds[0];
    for (const tabId of state.tabIds) {
      const t = tabs.get(tabId);
      tabBar.appendChild(t.button);
      panelBox.appendChild(t.panel);
      const isActive = tabId === state.active;
      t.button.classList.toggle('active', isActive);
      t.panel.classList.toggle('active', isActive);
      t.button.onclick = () => {
        state.active = tabId;
        applyPane(paneId);
        saveLayout();
      };
    }
  }

  function openInOppositePane(tabId) {
    let pipelinePane = null;
    for (const pid of ['paneA', 'paneB']) {
      if (paneState[pid].tabIds.includes('pipeline')) { pipelinePane = pid; break; }
    }
    const targetPane = pipelinePane === 'paneA' ? 'paneB' : 'paneA';
    if (paneState[targetPane].tabIds.includes(tabId)) {
      paneState[targetPane].active = tabId;
      applyPane(targetPane);
      saveLayout();
    } else {
      moveTab(tabId, targetPane);
    }
  }

  // Cross-pane move OR same-pane reorder. `insertIdx` < 0 means append.
  // When the tab is already in the target pane at the requested index
  // (modulo its own removal from earlier in the list) we no-op.
  function moveTab(tabId, targetPaneId, insertIdx = -1) {
    let sourcePaneId = null;
    for (const pid of ['paneA', 'paneB']) {
      if (paneState[pid].tabIds.includes(tabId)) { sourcePaneId = pid; break; }
    }
    if (!sourcePaneId) return;
    const src = paneState[sourcePaneId];
    const tgt = paneState[targetPaneId];
    const samePane = (sourcePaneId === targetPaneId);
    const oldIdx = src.tabIds.indexOf(tabId);
    let i = insertIdx;
    if (i < 0) i = tgt.tabIds.length;
    // For same-pane reorder, removing the tab shifts later indices left
    // by 1. Normalize the requested index so dropping a tab onto its own
    // current slot is a no-op.
    if (samePane && oldIdx >= 0 && i > oldIdx) i--;
    if (samePane && oldIdx === i) return;
    src.tabIds = src.tabIds.filter(id => id !== tabId);
    if (src.active === tabId && !samePane) src.active = src.tabIds[0] || null;
    if (i > tgt.tabIds.length) i = tgt.tabIds.length;
    tgt.tabIds.splice(i, 0, tabId);
    tgt.active = tabId;
    if (!samePane) applyPane(sourcePaneId);
    applyPane(targetPaneId);
    saveLayout();
  }

  // ──────────── drop targets ────────────
  //
  // The `.pane-tabs` strip computes an insertion index from the mouse X
  // position relative to existing tab buttons (so dropping between two
  // tabs reorders correctly within the same pane). The `.pane-panels`
  // area is a coarser drop target that always appends.

  function computeDropIdx(tabBar, clientX) {
    const btns = [...tabBar.querySelectorAll('button')];
    for (let i = 0; i < btns.length; i++) {
      const r = btns[i].getBoundingClientRect();
      if (clientX < r.left + r.width / 2) return i;
    }
    return btns.length;
  }

  function clearDropIndicators(tabBar) {
    tabBar.querySelectorAll('button.drop-before, button.drop-after')
      .forEach(b => b.classList.remove('drop-before', 'drop-after'));
  }

  function paintDropIndicator(tabBar, idx) {
    clearDropIndicators(tabBar);
    const btns = [...tabBar.querySelectorAll('button')];
    if (btns.length === 0) return;
    if (idx < btns.length) btns[idx].classList.add('drop-before');
    else btns[btns.length - 1].classList.add('drop-after');
  }

  for (const paneId of ['paneA', 'paneB']) {
    const pane = PANE_EL[paneId];
    const tabBar = pane.querySelector('.pane-tabs');
    const panelBox = pane.querySelector('.pane-panels');

    tabBar.addEventListener('dragover', e => {
      if (!e.dataTransfer.types.includes('text/plain')) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      tabBar.classList.add('drop-active');
      const idx = computeDropIdx(tabBar, e.clientX);
      tabBar.dataset.dropIdx = String(idx);
      paintDropIndicator(tabBar, idx);
    });
    tabBar.addEventListener('dragleave', e => {
      // Only clear when leaving the tab bar entirely, not when crossing
      // between child buttons.
      if (!tabBar.contains(e.relatedTarget)) {
        tabBar.classList.remove('drop-active');
        clearDropIndicators(tabBar);
        delete tabBar.dataset.dropIdx;
      }
    });
    tabBar.addEventListener('drop', e => {
      e.preventDefault();
      tabBar.classList.remove('drop-active');
      clearDropIndicators(tabBar);
      const tabId = e.dataTransfer.getData('text/plain');
      const idx = tabBar.dataset.dropIdx !== undefined
        ? parseInt(tabBar.dataset.dropIdx, 10) : -1;
      delete tabBar.dataset.dropIdx;
      if (tabId) moveTab(tabId, paneId, idx);
    });

    panelBox.addEventListener('dragover', e => {
      if (!e.dataTransfer.types.includes('text/plain')) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      panelBox.classList.add('drop-active');
    });
    panelBox.addEventListener('dragleave', () => panelBox.classList.remove('drop-active'));
    panelBox.addEventListener('drop', e => {
      e.preventDefault();
      panelBox.classList.remove('drop-active');
      const tabId = e.dataTransfer.getData('text/plain');
      if (tabId) moveTab(tabId, paneId);
    });
  }

  // ──────────── resize dividers ────────────
  for (const div of document.querySelectorAll('.divider')) {
    div.addEventListener('mousedown', e => {
      e.preventDefault();
      div.classList.add('dragging');
      const targetEl = document.getElementById(div.dataset.resize);
      const startX = e.clientX;
      const startW = targetEl.getBoundingClientRect().width;
      function onMove(ev) {
        const dx = ev.clientX - startX;
        const w = Math.max(150, startW + dx);
        targetEl.style.flexBasis = w + 'px';
      }
      function onUp() {
        div.classList.remove('dragging');
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
        saveLayout();
      }
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });
  }

  // ──────────── layout persistence ────────────
  // v2: removed 'source-view' tab, reordered defaults (pipeline+source
  // on the left). Older saved layouts referenced 'source-view' and would
  // restore a tab that no longer exists.
  //
  // The active BACKEND is intentionally NOT persisted — fresh reloads
  // always land on c0 (the visualizer's primary backend). c1 / c2 are
  // listed in the dropdown but show TBD content for now; persisting a
  // selection there would only confuse on reload.
  const LS_KEY = 'c0-viz-layout-v2';
  function saveLayout() {
    try {
      const data = {
        paneAW: document.getElementById('paneA').getBoundingClientRect().width,
        paneA: paneState.paneA,
        paneB: paneState.paneB,
      };
      localStorage.setItem(LS_KEY, JSON.stringify(data));
    } catch (e) { /* ignore quota / disabled storage */ }
  }
  function loadLayout() {
    let data = null;
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (raw) data = JSON.parse(raw);
    } catch (e) {}
    if (!data) return;
    if (data.paneAW) document.getElementById('paneA').style.flexBasis = data.paneAW + 'px';
    if (data.paneA && data.paneB) {
      const valid = new Set(TAB_DEFS.map(d => d.id));
      const a = (data.paneA.tabIds || []).filter(id => valid.has(id));
      const b = (data.paneB.tabIds || []).filter(id => valid.has(id));
      const used = new Set([...a, ...b]);
      for (const id of valid) if (!used.has(id)) a.push(id);
      paneState.paneA = { tabIds: a, active: a.includes(data.paneA.active) ? data.paneA.active : (a[0] || null) };
      paneState.paneB = { tabIds: b, active: b.includes(data.paneB.active) ? data.paneB.active : (b[0] || null) };
    }
  }

  // ──────────── render dispatch ────────────
  //
  // When BACKEND !== 'c0', the dynamic tabs show a TBD placeholder instead
  // of running their c0-specific renderers (which assume the c0 IR shape:
  // BasicBlock.statements as AST.Assigns, BrIf.cond as an AST expression
  // tree, etc.). c1/c2 round-trip and emit fine via Node — they just
  // don't have visualizer integration yet.
  function renderTbd(panel, def) {
    panel.appendChild(el('div', { class: 'hint' },
      'The ',
      el('strong', {}, def.label),
      ' tab for the ',
      el('span', { class: 'mono' }, BACKEND),
      ' backend is not yet wired into the visualizer. The compiler itself ' +
      'works end-to-end — exercise it via ',
      el('span', { class: 'mono' }, `node tests-${BACKEND}.js`),
      ' or by requiring ',
      el('span', { class: 'mono' }, `./${BACKEND}.js`),
      ' from Node. Switch the Backend selector back to c0 to use the visualizer.'));
  }
  function renderAll(trace) {
    for (const def of TAB_DEFS) {
      if (def.static) continue;
      const panel = tabs.get(def.id).panel;
      clear(panel);
      // c1: only the cfg tab is wired up so far; everything else still TBD.
      if (BACKEND === 'c1') {
        if (def.id === 'cfg') renderCfgC1(panel, trace);
        else renderTbd(panel, def);
        continue;
      }
      if (BACKEND !== 'c0') { renderTbd(panel, def); continue; }
      if (def.render) def.render(panel, trace);
    }
  }
  function renderError(_err) {
    for (const def of TAB_DEFS) {
      if (def.static || !def.render) continue;
      clear(tabs.get(def.id).panel);
    }
  }
  for (const def of TAB_DEFS) {
    if (def.static && def.render) {
      def.render(tabs.get(def.id).panel, null);
    }
  }

  // ──────────── source pipeline ────────────
  //
  // The Source tab is an overlay: a transparent <textarea> sits above a
  // syntax-highlighted <pre>. On every input we re-highlight; on every
  // scroll we mirror scrollTop/Left into the <pre>. The browser paints
  // glyphs from the <pre> at the same positions the textarea's caret
  // would sit on top of them — so the visible text APPEARS highlighted
  // but the actual editable element is still a plain textarea.

  const sourceEl     = tabs.get('source').panel.querySelector('#source');
  const sourcePreEl  = tabs.get('source').panel.querySelector('#source-pre');
  const errorsEl     = tabs.get('source').panel.querySelector('#errors');

  function refreshSourceHighlight() {
    // Trailing newline guard: when the textarea's value ends with `\n`,
    // browsers create a phantom blank line at the end; mirror that in
    // the <pre> by appending a space so the heights line up.
    const src = sourceEl.value;
    const padded = src.endsWith('\n') ? src + ' ' : src;
    sourcePreEl.innerHTML = highlightC0Source(padded);
  }

  function syncSourceScroll() {
    sourcePreEl.scrollTop  = sourceEl.scrollTop;
    sourcePreEl.scrollLeft = sourceEl.scrollLeft;
  }

  sourceEl.addEventListener('scroll', syncSourceScroll);

  function recompile() {
    refreshSourceHighlight();
    syncSourceScroll();
    // c2 still TBD: skip compileWithTrace entirely. c0 + c1 are both
    // wired to renderers below; renderAll dispatches per backend.
    if (BACKEND !== 'c0' && BACKEND !== 'c1') {
      errorsEl.classList.add('hidden');
      clear(errorsEl);
      renderAll(null);
      return;
    }
    let trace;
    try {
      trace = activeCompiler().CODEGEN.compileWithTrace(sourceEl.value, '<editor>');
    } catch (e) {
      errorsEl.classList.remove('hidden');
      clear(errorsEl);
      errorsEl.appendChild(el('div', { class: 'err' }, e.message));
      renderError(e);
      return;
    }
    // Surface bytesError if direct + lift both failed.
    if (trace.bytesError) {
      errorsEl.classList.remove('hidden');
      clear(errorsEl);
      errorsEl.appendChild(el('div', { class: 'err' }, trace.bytesError.message));
    } else {
      errorsEl.classList.add('hidden');
      clear(errorsEl);
    }
    renderAll(trace);
  }

  // ──────────── backend selector ────────────
  const backendSelect = document.getElementById('backend-select');
  // Repopulate from BACKENDS_AVAILABLE (build.py controls this).
  clear(backendSelect);
  // Note: c1 is TAC (not SSA — that's c2); c2 uses the universal dispatcher,
  // not a structurizer. The visualizer hasn't been wired for c1/c2 yet, so
  // they're labeled TBD and render placeholder content when selected.
  const LABELS = {
    c0: 'c0 (statement-CFG)',
    c1: 'c1 (TAC)',
    c2: 'c2 (SSA — TBD)',
  };
  for (const k of BACKENDS_AVAILABLE) {
    backendSelect.appendChild(el('option', { value: k }, LABELS[k] || k));
  }
  backendSelect.addEventListener('change', () => {
    BACKEND = backendSelect.value;
    const pipelinePanel = tabs.get('pipeline').panel;
    clear(pipelinePanel);
    renderPipeline(pipelinePanel, null);
    recompile();
    saveLayout();
  });

  // ──────────── example dropdown ────────────
  const select = document.getElementById('example-select');
  for (const name of Object.keys(EXAMPLES)) {
    select.appendChild(el('option', { value: name }, name));
  }
  select.addEventListener('change', () => {
    sourceEl.value = EXAMPLES[select.value];
    recompile();
  });

  // ──────────── debounced auto-recompile ────────────
  //
  // Two concerns on every keystroke: (a) refresh the overlay highlight
  // synchronously so the user never sees stale glyphs through the
  // transparent textarea; (b) recompile + re-render detail tabs on a
  // debounce so we're not re-doing AST/CFG work mid-typing.
  let timer = null;
  sourceEl.addEventListener('input', () => {
    refreshSourceHighlight();
    syncSourceScroll();
    clearTimeout(timer);
    timer = setTimeout(recompile, 150);
  });

  // ──────────── boot ────────────
  loadLayout();
  if (backendSelect.value !== BACKEND) backendSelect.value = BACKEND;
  applyPane('paneA');
  applyPane('paneB');
  sourceEl.value = EXAMPLES[Object.keys(EXAMPLES)[0]];
  recompile();

  // Expose for tests / extensions.
  window.__viz = {
    TAB_DEFS, tabs, paneState, PANE_EL,
    renderAll, renderError, applyPane, moveTab, openInOppositePane, saveLayout,
    el, svgEl, clear, printExpr,
  };
})();
</script>

</body>
</html>
