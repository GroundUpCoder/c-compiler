  return x;
}`,
    "switch (3-way)": `i32 step(i32 k) {
  switch (k) {
    case 0: return 10;
    case 1: return 20;
    case 2: return 30;
    default: return -1;
  }
}`,
    // Irreducible CFG: the loop body {A, B} has TWO entries — A is
    // reached by fall-through (when x ≤ 0), B by the initial goto
    // (when x > 0). A structurizer can't express this without
    // duplicating code or introducing a dispatch variable. c0 handles
    // it natively because its emit path goes through CFG.intoAST, which
    // turns ANY CFG into a while-switch dispatcher.
    "irreducible (two-entry loop)": `i32 spin(i32 x, i32 n) {
  i32 acc = 0;
  i32 i = 1;
  if (x > 0) { goto B; }
  A: acc = acc + i;
  i = i + 1;
  B: acc = acc + i * 2;
  i = i + 1;
  if (i <= n) { goto A; }
  return acc;
}`,
    "arithmetic": `i32 mix(i32 a, i32 b) {
  return (a + b) * 2 - 1;
}`,
  };

  // ──────────── DOM helpers ────────────
  function el(tag, attrs = {}, ...children) {
    const e = document.createElement(tag);
    for (const k in attrs) {
      if (k === 'class') e.className = attrs[k];
      else if (k === 'html') e.innerHTML = attrs[k];
      else if (k.startsWith('on') && typeof attrs[k] === 'function') {
        e.addEventListener(k.slice(2), attrs[k]);
      } else if (k === 'style' && typeof attrs[k] === 'object') {
        Object.assign(e.style, attrs[k]);
      } else {
        e.setAttribute(k, attrs[k]);
      }
    }
    for (const c of children) {
      if (c === null || c === undefined) continue;
      if (typeof c === 'string') e.appendChild(document.createTextNode(c));
      else if (Array.isArray(c)) c.forEach(cc => cc && e.appendChild(cc));
      else e.appendChild(c);
    }
    return e;
  }
  function svgEl(tag, attrs = {}) {
    const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (const k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }
  function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

  // ──────────── source snippets (extracted by build.py) ────────────
  //
  // SNIPPETS is a string map of region name → real c0.js source for that
  // phase. We pre-highlight once so every detail-tab re-render is just an
  // innerHTML assignment (no per-keystroke tokenization work).

  const SNIPPETS = window.SNIPPETS || {};

  // Minimal JS syntax tinter: line comments, string literals,
  // identifiers/keywords, numbers, everything else.
  function highlightJs(src) {
    const escape = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const KW = new Set([
      'function', 'return', 'if', 'else', 'for', 'while', 'do', 'switch',
      'case', 'default', 'break', 'continue', 'const', 'let', 'var',
      'new', 'class', 'extends', 'super', 'this', 'true', 'false', 'null',
      'undefined', 'typeof', 'instanceof', 'in', 'of', 'throw', 'try', 'catch',
    ]);
    const segs = [];
    let i = 0;
    while (i < src.length) {
      if (src[i] === '/' && src[i+1] === '/') {
        const nl = src.indexOf('\n', i);
        const end = nl === -1 ? src.length : nl;
        segs.push({ k: 'cmt', t: src.slice(i, end) });
        i = end;
        continue;
      }
      if (src[i] === "'" || src[i] === '"' || src[i] === '`') {
        const q = src[i];
        let j = i + 1;
        while (j < src.length && src[j] !== q) {
          if (src[j] === '\\') j += 2; else j++;
        }
        j = Math.min(j + 1, src.length);
        segs.push({ k: 'str', t: src.slice(i, j) });
        i = j;
        continue;
      }
      if (/[A-Za-z_$]/.test(src[i])) {
        let j = i + 1;
        while (j < src.length && /[A-Za-z0-9_$]/.test(src[j])) j++;
        const word = src.slice(i, j);
        segs.push({ k: KW.has(word) ? 'kw' : 'id', t: word });
        i = j;
        continue;
      }
      if (/[0-9]/.test(src[i])) {
        let j = i + 1;
        while (j < src.length && /[0-9.xXa-fA-FnL]/.test(src[j])) j++;
        segs.push({ k: 'num', t: src.slice(i, j) });
        i = j;
        continue;
      }
      segs.push({ k: '', t: src[i] });
      i++;
    }
    let out = '';
    for (const s of segs) {
      if (s.k === '') out += escape(s.t);
      else out += `<span class="src-${s.k}">${escape(s.t)}</span>`;
    }
    return out;
  }

  const SNIPPETS_HTML = {};
  for (const k in SNIPPETS) SNIPPETS_HTML[k] = highlightJs(SNIPPETS[k]);

  // Mini-tokenizer for the c0 surface language. Used by Source(view) and
  // the Lifted tab — both are read-only, syntax-highlighted views.
  function highlightC0Source(src) {
    const TYPES = new Set(['i32', 'i64', 'f32', 'f64']);
    const KEYWORDS = new Set(['if', 'else', 'goto', 'return',
      'while', 'switch', 'case', 'default', 'break']);
    const escape = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    let out = '';
    let i = 0;
    const N = src.length;
    while (i < N) {
      const c = src[i];
      if (c === '/' && src[i + 1] === '/') {
        const nl = src.indexOf('\n', i);
        const end = nl === -1 ? N : nl;
        out += `<span class="src-cmt">${escape(src.slice(i, end))}</span>`;
        i = end;
        continue;
      }
      if (/[A-Za-z_]/.test(c)) {
        let j = i + 1;
        while (j < N && /[A-Za-z0-9_]/.test(src[j])) j++;
        const word = src.slice(i, j);
        if (TYPES.has(word))         out += `<span class="src-type">${escape(word)}</span>`;
        else if (KEYWORDS.has(word)) out += `<span class="src-kw">${escape(word)}</span>`;
        else                          out += escape(word);
        i = j;
        continue;
      }
      if (/[0-9]/.test(c)) {
        let j = i + 1;
        while (j < N && /[0-9.Lf]/.test(src[j])) j++;
        out += `<span class="src-num">${escape(src.slice(i, j))}</span>`;
        i = j;
        continue;
      }
      out += escape(c);
      i++;
    }
    return out;
  }

  // Build a light-bg `<pre class="code">` block with JS-style syntax
  // highlighting. Most inline code blocks in the explainer prose use
  // this — e.g., the "class Node { ... }" anatomy snippets.
  function codeBlock(src) {
    const pre = el('pre', { class: 'code' });
    pre.innerHTML = highlightJs(src);
    return pre;
  }

  // Build a collapsible <details> block showing one (or several) c0.js
  // snippet regions. `keys` may be a string or array of strings; each
  // resolves via SNIPPETS_HTML. Returns null if no keys resolved.
  function makePhaseSourceBlock(keys, label) {
    const arr = Array.isArray(keys) ? keys : [keys];
    const blocks = arr
      .filter(k => SNIPPETS_HTML[k])
      .map(k => ({ k, html: SNIPPETS_HTML[k] }));
    if (blocks.length === 0) return null;
    const det = el('details', { class: 'phase-source' });
    const labelStr = label || (arr.length === 1
      ? `c0.js: ${arr[0]}()`
      : `c0.js: ${arr.join(', ')}`);
    det.appendChild(el('summary', {}, labelStr));
    for (const b of blocks) {
      if (blocks.length > 1) {
        det.appendChild(el('div', { class: 'phase-source-key mono' }, `// ${b.k}`));
      }
      const pre = el('pre', { class: 'phase-code' });
      pre.innerHTML = b.html;
      det.appendChild(pre);
    }
    return det;
  }

  // ──────────── catalog-table helper ────────────
  function makeCatalog(rows, notes) {
    const table = el('table', { class: 'catalog' });
    const head = el('tr', {},
      el('th', {}, 'Role'),
      el('th', {}, 'Class / kind'),
      el('th', {}, 'What it represents'));
    table.appendChild(head);
    for (const r of rows) {
      const tr = el('tr', r.divider ? { class: 'cat-divider' } : {});
      tr.appendChild(el('td', { class: 'cat' }, r.cat || ''));
      tr.appendChild(el('td', { class: 'cname' }, r.name));
      const descCell = el('td', {});
      if (typeof r.desc === 'string') {
        descCell.textContent = r.desc;
      } else {
        for (const part of r.desc) {
          if (typeof part === 'string') descCell.appendChild(document.createTextNode(part));
          else descCell.appendChild(part);
        }
      }
      tr.appendChild(descCell);
      table.appendChild(tr);
    }
    const wrap = el('div');
    wrap.appendChild(table);
    if (notes) wrap.appendChild(el('div', { class: 'hint muted' }, notes));
    return wrap;
  }

  // ──────────── expression printer (for CFG view) ────────────
  // A small precedence-aware printer for AST.Expression — used to show
  // BrIf conditions / Return values / Assign right-hand-sides in the
  // CFG text view. Avoid heavy-weight string allocations: this is on the
  // hot per-keystroke path.

  const _PREC = {
    '||': 1, '&&': 2,
    '==': 3, '!=': 3, '<': 4, '<=': 4, '>': 4, '>=': 4,
    '+': 5, '-': 5, '*': 6, '/': 6, '%': 6,
  };

  function printExpr(e, parentPrec = 0) {
    if (!e) return '⊥';
    const cls = e.constructor && e.constructor.name;
    if (cls === 'Literal') {
      if (e.type === 'i64') return e.value.toString() + 'L';
      if (e.type === 'f32') return Number(e.value).toString() + 'f';
      if (e.type === 'f64') {
        const s = Number(e.value).toString();
        return s.includes('.') || s.includes('e') ? s : s + '.0';
      }
      return e.value.toString();
    }
    if (cls === 'Variable') return e.name;
    if (cls === 'Unary') {
      return `${e.op}${printExpr(e.operand, 7)}`;
    }
    if (cls === 'Binary') {
      const p = _PREC[e.op] ?? 0;
      const s = `${printExpr(e.left, p)} ${e.op} ${printExpr(e.right, p + 1)}`;
      return p < parentPrec ? `(${s})` : s;
    }
    return cls || '?';
  }

  // ──────────── renderers ────────────

  const TAB_DEFS = [];
  const tabs = new Map();

  // ── Tokens ──
  function renderTokens(panel, trace) {
    panel.appendChild(el('div', { class: 'hint' },
      'The lexer is the first stage: it walks the raw source string left-to-' +
      'right and produces a flat array of tokens. Each token carries a type ' +
      'tag, a value payload, and source location (line/column). Whitespace ' +
      'and `//` comments are skipped; numbers split into NUM vs FLOAT by ' +
      'whether they contain a `.`.'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'Token anatomy'));
    panel.appendChild(codeBlock(
      '// Each token is just a plain object — no class.\n' +
      '{\n' +
      '  type: string,  // tag (see catalog)\n' +
      '  value: any,    // payload\n' +
      '  line: number,  // 1-based\n' +
      '  col:  number,  // 1-based\n' +
      '}'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'Token types'));
    panel.appendChild(makeCatalog([
      { cat: 'reserved',  name: 'KW',    desc: ['Keyword token. `type` IS the keyword. The set is fixed: ',
                                                 el('span', { class: 'mono' }, 'i32 i64 f32 f64 if else while break switch case default goto return'), '.'] },
      { cat: 'name',      name: 'ID',    desc: 'Identifier (variable, label, function name). `value` is the name string.' },
      { cat: 'literal',   name: 'NUM',   desc: 'Integer literal. `value` is a BigInt. Always parsed as i32 by default.' },
      { cat: 'literal',   name: 'FLOAT', desc: 'Float literal. `value` is a number. Always parsed as f64 by default.' },
      { cat: 'punctuation', name: 'OP',  desc: ['Operator / punctuation. `type` IS the operator text. ',
                                                 'Single-char: ', el('span', { class: 'mono' }, '{ } ( ) [ ] ; , : + - * / % ! = < >'),
                                                 '; two-char: ', el('span', { class: 'mono' }, '== != <= >='), '.'] },
    ]));

    panel.appendChild(el('div', { class: 'callout' },
      el('strong', {}, 'No semicolon insertion, no string literals. '),
      'Every statement ends with a literal `;`. Comments are `//` to end of line. ' +
      'There are no string or char literals in the language at all.'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'Source reference'));
    const src = makePhaseSourceBlock('lex', 'Derivation: PARSER.tokenize()');
    if (src) panel.appendChild(src);

    panel.appendChild(el('h2', { class: 'section-title' }, 'Tokens for the current source'));
    const table = el('table', { class: 'kv' });
    table.appendChild(el('tr', {},
      el('th', {}, 'Loc'),
      el('th', {}, 'Type'),
      el('th', {}, 'Value')));
    for (const t of trace.tokens) {
      const loc = `${t.line}:${t.col}`;
      let val;
      if (t.value === null || t.value === undefined) val = '·';
      else if (typeof t.value === 'bigint') val = t.value.toString();
      else val = String(t.value);
      const typeCls =
        ['i32','i64','f32','f64','if','else','while','break','switch','case','default','goto','return'].includes(t.type)
          ? 'kw' :
        (t.type === 'NUM' || t.type === 'FLOAT') ? 'num' :
        t.type === 'ID' ? 'type' : 'mute';
      table.appendChild(el('tr', {},
        el('td', { class: 'mute' }, loc),
        el('td', { class: typeCls }, t.type),
        el('td', { class: 'mono' }, val)));
    }
    panel.appendChild(table);
  }

  // ── AST ──
  function astChildren(node) {
    const cls = node.constructor ? node.constructor.name : 'Node';
    switch (cls) {
      case 'Program':  return node.functions;
      case 'Function': return [node.body];
      case 'Block':    return node.statements;
      case 'Declare':  return node.initializer ? [node.initializer] : [];
      case 'Assign':   return [node.value];
      case 'If':       return [node.cond, node.thenBlock]
                              .concat(node.elseBlock ? [node.elseBlock] : []);
      case 'While':    return [node.cond, node.body];
      case 'Switch':   {
        const kids = [node.value, ...node.cases];
        if (node.defaultBlock) kids.push(node.defaultBlock);
        return kids;
      }
      case 'Case':     return [node.block];
      case 'Return':   return node.value ? [node.value] : [];
      case 'Binary':   return [node.left, node.right];
      case 'Unary':    return [node.operand];
      default:         return [];
    }
  }

  function astHeader(node) {
    const cls = node.constructor ? node.constructor.name : 'Node';
    const header = el('div');
    header.appendChild(el('span', { class: 'type' }, cls));
    function txt(s) { header.appendChild(document.createTextNode(s)); }
    function span(s, c) { header.appendChild(el('span', { class: c }, s)); }
    switch (cls) {
      case 'Function': {
        txt(' '); span(node.name, 'kw'); txt('(');
        node.parameters.forEach((p, i) => {
          if (i > 0) txt(', ');
          span(p.type, 'type'); txt(' ' + p.name);
        });
        txt(') → '); span(node.returnType, 'type');
        break;
      }
      case 'Declare':  txt(' '); span(node.variable.type, 'type'); txt(' ' + node.variable.name);
                       if (node.initializer) txt(' ='); break;
      case 'Assign':   txt(' ' + node.variable.name + ' ='); break;
      case 'Variable': txt(' '); span(node.name, 'kw');
                       txt(' : '); span(node.type, 'type'); break;
      case 'Label':    txt(' '); span(node.name, 'kw'); txt(':'); break;
      case 'Goto':     txt(' '); span(node.target, 'kw'); break;
      case 'Case':     txt(' '); span(String(node.value), 'num'); break;
      case 'Literal':  txt(' '); span(String(node.value) + (node.type === 'i64' ? 'L' : ''), 'num');
                       txt(' : '); span(node.type, 'type'); break;
      case 'Binary':   txt(' '); span(node.op, 'kw'); break;
      case 'Unary':    txt(' '); span(node.op, 'kw'); break;
    }
    return header;
  }

  function astNode(node) {
    const wrap = el('div', { class: 'ast-node' });
    wrap.appendChild(astHeader(node));
    const kids = astChildren(node);
    if (kids.length) {
      const box = el('div', { class: 'ast-children' });
      for (const k of kids) box.appendChild(astNode(k));
      wrap.appendChild(box);
    }
    return wrap;
  }

  function renderAst(panel, trace) {
    panel.appendChild(el('div', { class: 'hint' },
      'The Abstract Syntax Tree is the parser\'s output: a single rooted tree ' +
      'whose structure mirrors the source. Each node is a JS class instance; ' +
      'children are stored as direct object references, not numeric handles. ' +
      'Variable references SHARE the AST.Variable instance with their ' +
      'declaration — the parser maintains a per-function scope map and ' +
      're-uses the same object on every reference.'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'Node anatomy'));
    panel.appendChild(el('div', { class: 'hint' },
      'Every node carries a `loc` field threaded down from the lexer. ' +
      'Subclasses add their own fields:'));
    panel.appendChild(codeBlock(
      'class Binary {\n' +
      '  constructor(loc, op, left, right) {\n' +
      '    this.loc = loc;\n' +
      '    this.op = op;        // "+", "-", "<", "==", ...\n' +
      '    this.left = left;    // an expression node\n' +
      '    this.right = right;  // an expression node\n' +
      '  }\n' +
      '}'));

    panel.appendChild(el('div', { class: 'callout' },
      el('strong', {}, 'Worked example. '),
      'The source ',
      el('span', { class: 'mono' }, 'i32 sum(i32 n) { return n + 1; }'),
      ' parses to this tree of node instances:'));
    panel.appendChild(codeBlock(
      'Program\n' +
      '└── Function  name="sum"  returnType="i32"\n' +
      '    │         parameters=[ Variable("n", i32) ]\n' +
      '    └── body: Block\n' +
      '        └── Return\n' +
      '            └── Binary  op="+"\n' +
      '                ├── left:  Variable("n", i32)\n' +
      '                └── right: Literal(value=1n, type="i32")'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'Every AST node type'));
    panel.appendChild(makeCatalog([
      { cat: 'top-level', name: 'Program',  desc: '`functions: Function[]`. The compilation unit\'s root.' },
      { cat: 'top-level', name: 'Function', desc: '`returnType, name, parameters: Variable[], body: Block`.' },
      { cat: 'statement', divider: true, name: 'Block',    desc: '`statements: Stmt[]`. A `{ … }` brace block.' },
      { cat: 'statement', name: 'Declare',  desc: '`variable: Variable, initializer?`. A `T x = expr;` declaration.' },
      { cat: 'statement', name: 'Assign',   desc: '`variable: Variable, value`. The `variable` is the same instance as the original declaration\'s.' },
      { cat: 'statement', name: 'If',       desc: '`cond, thenBlock, elseBlock?`. The else-arm may be null.' },
      { cat: 'statement', name: 'While',    desc: '`cond, body`. `while (cond) { … }`. `break` exits the innermost loop or switch.' },
      { cat: 'statement', name: 'Switch',   desc: '`value, cases: Case[], defaultBlock?`. C-style switch but each case has its own block — no fallthrough.' },
      { cat: 'statement', name: 'Case',     desc: '`value: number, block: Block`. The literal int case value and its arm.' },
      { cat: 'statement', name: 'Break',    desc: 'No payload. Exits the innermost enclosing While or Switch.' },
      { cat: 'statement', name: 'Label',    desc: '`name`. A `L:` target — sibling of other statements, not a wrapper.' },
      { cat: 'statement', name: 'Goto',     desc: '`target`. A `goto L;` to a label declared elsewhere in the function.' },
      { cat: 'statement', name: 'Return',   desc: '`value`. The expression to return (no void).' },
      { cat: 'expression', divider: true, name: 'Binary',  desc: '`op, left, right`. Arithmetic or comparison. Comparison ops always type-out to i32.' },
      { cat: 'expression', name: 'Unary',   desc: '`op, operand`. Unary `-` (negate) or `!` (i32.eqz).' },
      { cat: 'expression', name: 'Literal', desc: '`type: "i32"|"i64"|"f32"|"f64", value`. NUM tokens lift to i32; FLOAT to f64.' },
      { cat: 'expression', name: 'Variable',desc: '`type, name`. Shared instance — same object for the declaration and every reference.' },
    ]));

    panel.appendChild(el('div', { class: 'callout' },
      el('strong', {}, 'Variable identity. '),
      'Because AST.Variable instances are shared, the AST tree below shows ' +
      'a variable as a leaf node both at its declaration and at every ' +
      'reference site. Two uses of `x` are the same JS object — `===` true. ' +
      'This makes the lowerer trivial: there\'s no name resolution step ' +
      'because resolution already happened during parsing.'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'Source references'));
    const src1 = makePhaseSourceBlock('parse', 'Derivation: PARSER.parse()');
    if (src1) panel.appendChild(src1);
    const src2 = makePhaseSourceBlock('ast-shape', 'Class definitions: const AST = (() => { … })()');
    if (src2) panel.appendChild(src2);

    panel.appendChild(el('h2', { class: 'section-title' }, 'AST for the current source'));
    renderAstWithToggle(panel, trace.ast, 'ast');
  }

  // Helper: a Tree/Source toggle + an output container. Used by both
  // the AST tab and the Lifted tab. View choice is remembered per
  // `key` (module-level map) so recompiles don't reset it.
  const _astViewMode = { ast: 'tree', lifted: 'source' };
  function renderAstWithToggle(panel, program, key) {
    const toggle = el('div', { class: 'toggle-group' },
      el('button', { 'data-view': 'tree' },   'Tree'),
      el('button', { 'data-view': 'source' }, 'Source'));
    panel.appendChild(toggle);
    const container = el('div');
    panel.appendChild(container);
    function render(view) {
      clear(container);
      if (view === 'source') {
        let src;
        try { src = activeCompiler().AST.printSource(program); }
        catch (e) {
          container.appendChild(el('div', { class: 'mute mono' },
            '// printSource failed: ' + e.message));
          return;
        }
        const pre = el('pre', { class: 'source-view' });
        pre.innerHTML = highlightC0Source(src);
        container.appendChild(pre);
      } else {
        const root = el('div', { class: 'ast-tree' });
        root.appendChild(astNode(program));
        container.appendChild(root);
      }
    }
    toggle.querySelectorAll('button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.view === _astViewMode[key]);
      btn.addEventListener('click', () => {
        _astViewMode[key] = btn.dataset.view;
        toggle.querySelectorAll('button').forEach(b =>
          b.classList.toggle('active', b.dataset.view === _astViewMode[key]));
        render(_astViewMode[key]);
      });
    });
    render(_astViewMode[key]);
  }

  // ── Lifted ──
  function renderLifted(panel, trace) {
    panel.appendChild(el('div', { class: 'hint' },
      'The Lifted tab is c0\'s ',
      el('strong', {}, 'round-trip'),
      ' of the source through the CFG and back into a structured AST. ',
      el('span', { class: 'mono' }, 'PARSER.parse → CFG.fromAST → CFG.intoAST'),
      ' produces an AST.Program where each function\'s body is a ',
      el('span', { class: 'mono' }, 'while (1) { switch (__state) { … } }'),
      ' dispatcher — functionally identical to the original source but ' +
      'using no label/goto. This is the form CODEGEN.emit sees when the ' +
      'source contains gotos (which CODEGEN.emit rejects directly).'));

    panel.appendChild(el('div', { class: 'callout' },
      el('strong', {}, 'Tree vs Source. '),
      'The Tree view exposes the lifted AST node-for-node — handy for ' +
      'seeing how each block\'s terminator turned into ',
      el('span', { class: 'mono' }, '__state = N; break;'),
      ' or a Return. The Source view runs AST.printSource on it: paste ' +
      'the result back into the editor and it will compile via the direct ' +
      'CODEGEN.emit path with no further round-trip.'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'Source reference'));
    const src = makePhaseSourceBlock('c0-lift',
      'Derivation: CFG.intoAST() — CFG.Module → AST.Program');
    if (src) panel.appendChild(src);

    panel.appendChild(el('h2', { class: 'section-title' }, 'Lifted output for the current source'));
    if (!trace.lifted) {
      const err = trace.liftedError?.message || trace.modError?.message || 'unknown';
      panel.appendChild(el('div', { class: 'mute mono' }, '// lift failed: ' + err));
      return;
    }
    renderAstWithToggle(panel, trace.lifted, 'lifted');
  }

  // ── CFG (text view) ──
  function stmtText(st) {
    const cls = st.constructor && st.constructor.name;
    if (cls === 'Assign') {
      return `${st.variable.name} = ${printExpr(st.value)}`;
    }
    return cls + '(...)';
  }

  function termSummary(term) {
    if (!term) return { kind: '?', expr: '' };
    const cls = term.constructor && term.constructor.name;
    if (cls === 'Br')          return { kind: 'br', expr: term.target.name };
    if (cls === 'BrIf')        return { kind: 'br_if', expr:
      `${printExpr(term.cond)} → ${term.trueTarget.name} / ${term.falseTarget.name}` };
    if (cls === 'Return')      return { kind: 'return', expr: printExpr(term.value) };
    if (cls === 'Unreachable') return { kind: 'unreachable', expr: '' };
    return { kind: cls.toLowerCase(), expr: '' };
  }

  function renderCfgBlock(fn, b) {
    const isEntry = (b === fn.entry);
    const div = el('div', { class: 'cfg-block' + (isEntry ? ' entry' : '') });
    const header = el('div', { class: 'header' });
    header.appendChild(document.createTextNode(b.name));
    header.appendChild(document.createTextNode(':'));
    if (isEntry) header.appendChild(el('span', { class: 'mute' }, '  ← entry'));
    div.appendChild(header);
    for (const st of b.statements) {
      div.appendChild(el('div', { class: 'inst' }, stmtText(st)));
    }
    if (b.terminator) {
      const t = termSummary(b.terminator);
      div.appendChild(el('div', { class: 'term' },
        '↳ ' + t.kind + (t.expr ? '  ' + t.expr : '')));
    }
    return div;
  }

  function renderFnCfgText(fn) {
    const box = el('div');
    for (const b of fn.blocks) box.appendChild(renderCfgBlock(fn, b));
    return box;
  }

  function renderCfg(panel, trace) {
    panel.appendChild(el('div', { class: 'hint' },
      'The Control-Flow Graph is c0\'s "middle IR": a graph of basic blocks ' +
      '(straight-line sequences of statements ending in exactly one terminator) ' +
      'plus the edges between them. c0\'s CFG is deliberately simple — ',
      el('strong', {}, 'each block holds plain AST.Assign statements, '),
      'not stack-machine instructions or SSA values. Expressions stay as ' +
      'AST trees on both block statements and terminators (BrIf cond, ' +
      'Return value).'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'What makes this a "statement-CFG"'));
    panel.appendChild(el('div', { class: 'hint' },
      'Every CFG.BasicBlock stores its straight-line body as a list of ' +
      'AST.Assign nodes — the exact same class the parser produces. No ' +
      'flattening to stack ops, no SSA renaming. The CFG\'s job is only to ' +
      'make the program\'s control flow explicit: where branches go, where ' +
      'merges happen, which blocks are reachable.'));

    panel.appendChild(el('div', { class: 'callout' },
      el('strong', {}, 'Why this is so much simpler than TAC / SSA. '),
      'A reassignment `i = i + 1` stays as a single AST.Assign — same ' +
      'variable instance, same expression tree. No fresh value name, no ' +
      'merge-point phi to maintain at if/else joins, no goto-bypass-init ' +
      'bookkeeping. The cost: lower-quality codegen, since every variable ' +
      'reference always reads from a mutable wasm local. The sibling c1 ' +
      'backend (TAC) and c2 (SSA) recover that information at the cost of ' +
      'IR verbosity — see TAC-SSA.md and SSA.md.'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'Every CFG type'));
    panel.appendChild(makeCatalog([
      { cat: 'terminator', name: 'Terminator', desc: 'Abstract base. Subclasses below — one per kind of out-edge. Exposes `successors`.' },
      { cat: 'terminator', name: 'Br',          desc: '`{ target: BasicBlock }`. Unconditional jump. No args (locals are mutable).' },
      { cat: 'terminator', name: 'BrIf',        desc: '`{ cond: AST.Expression, trueTarget, falseTarget }`. Conditional jump; `cond` is a full AST expression tree.' },
      { cat: 'terminator', name: 'Return',      desc: '`{ value: AST.Expression }`. Returns the expression from the function.' },
      { cat: 'terminator', name: 'Unreachable', desc: 'Trap-now sentinel. Inserted by CFG.fromAST if a function falls off the end without returning.' },
      { cat: 'container',  divider: true, name: 'BasicBlock', desc: '`{ name, id, statements: AST.Assign[], terminator }`. Has `append(stmt)` and `terminate(t)`.' },
      { cat: 'container',  name: 'Function',    desc: '`{ name, params: AST.Variable[], returnType, locals: AST.Variable[], entry, blocks }`.' },
      { cat: 'container',  name: 'Module',      desc: '`{ functions: Function[] }`.' },
    ]));

    panel.appendChild(el('div', { class: 'callout' },
      el('strong', {}, 'Why not lower BrIf.cond too? '),
      'It\'s tempting to want every block to carry only flat statements and ' +
      'have every terminator be value-free. But that would force splitting ' +
      'every BrIf condition into its own block. Carrying the expression on ' +
      'the terminator keeps the CFG one-block-per-decision-point — far ' +
      'easier to read.'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'Source references'));
    const src = makePhaseSourceBlock('c0-lower',
      'Derivation: CFG.fromAST() — AST → CFG.Module');
    if (src) panel.appendChild(src);
    const shape = makePhaseSourceBlock('cfg-shape',
      'Class definitions: const CFG = (() => { … })()');
    if (shape) panel.appendChild(shape);

    panel.appendChild(el('h2', { class: 'section-title' }, 'CFG for the current source'));
    panel.appendChild(el('div', { class: 'hint muted' },
      'Entry blocks are highlighted green. Switch to Graph view for a ' +
      'level-ordered layout with bezier edges (green = if true, red = if ' +
      'false, dashed purple = back-edge).'));

    if (!trace.mod) {
      panel.appendChild(el('div', { class: 'mute mono' },
        '(CFG.fromAST failed: ' + (trace.modError?.message || 'unknown') + ')'));
      return;
    }

    const toggle = el('div', { class: 'toggle-group' },
      el('button', { 'data-view': 'text', class: 'active' }, 'Text'),
      el('button', { 'data-view': 'graph' }, 'Graph'));
    panel.appendChild(toggle);
    const container = el('div');
    panel.appendChild(container);

    function render(view) {
      clear(container);
      for (const fn of trace.mod.functions) {
        const group = el('div', { class: 'fn-group' });
        group.appendChild(el('h3', {}, fn.name,
          el('span', { class: 'sub' },
            ' (' + fn.params.map(p => p.type).join(', ') + ') → ' + fn.returnType)));
        if (view === 'text') {
          group.appendChild(renderFnCfgText(fn));
        } else {
          group.appendChild(renderFnCfgGraph(fn));
        }
        container.appendChild(group);
      }
    }
    toggle.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        toggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(btn.dataset.view);
      });
    });
    render('text');
  }

  // ── CFG graph: BFS-level layout with DIV nodes + SVG edges ──
  function renderFnCfgGraph(fn) {
    const blocks = fn.blocks;

    // Edge extraction.
    const edges = [];
    for (const b of blocks) {
      const term = b.terminator;
      if (!term) continue;
      const cls = term.constructor && term.constructor.name;
      if (cls === 'Br') {
        edges.push({ from: b.id, to: term.target.id, label: '', kind: 'goto' });
      } else if (cls === 'BrIf') {
        edges.push({ from: b.id, to: term.trueTarget.id,  label: 'T', kind: 'true' });
        edges.push({ from: b.id, to: term.falseTarget.id, label: 'F', kind: 'false' });
      }
    }

    // BFS levels from entry; orphans appended.
    const entryId = fn.entry.id;
    const level = { [entryId]: 0 };
    const bfs = [entryId];
    while (bfs.length) {
      const u = bfs.shift();
      for (const e of edges) {
        if (e.from === u && !(e.to in level)) {
          level[e.to] = level[u] + 1;
          bfs.push(e.to);
        }
      }
    }
    let maxL = 0;
    for (const k of Object.keys(level)) maxL = Math.max(maxL, level[+k]);
    for (const b of blocks) if (!(b.id in level)) level[b.id] = ++maxL;
    for (const e of edges) e.back = level[e.to] <= level[e.from];

    const stage = el('div', { class: 'cfg-stage' });
    const svgNs = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNs, 'svg');
    svg.setAttribute('class', 'cfg-edges');
    stage.appendChild(svg);

    const nodeEls = new Map();
    for (const b of blocks) {
      const isEntry = (b === fn.entry);
      const div = el('div', { class: 'cfg-node' + (isEntry ? ' entry' : '') });
      const hdr = el('div', { class: 'cfg-node-header' });
      hdr.appendChild(document.createTextNode(b.name));
      div.appendChild(hdr);
      const body = el('div', { class: 'cfg-node-body' });
      if (b.statements.length === 0) {
        body.appendChild(el('div', { class: 'cfg-node-stmt empty' }, '(no statements)'));
      } else {
        for (const st of b.statements) {
          let txt = stmtText(st);
          if (txt.length > 38) txt = txt.slice(0, 35) + '…';
          body.appendChild(el('div', { class: 'cfg-node-stmt' }, txt));
        }
      }
      div.appendChild(body);
      const tsum = termSummary(b.terminator);
      const tdiv = el('div', { class: 'cfg-node-term term-' + tsum.kind });
      tdiv.appendChild(el('span', { class: 'cfg-term-kind' }, tsum.kind));
      if (tsum.expr) {
        let exprTxt = tsum.expr;
        if (exprTxt.length > 32) exprTxt = exprTxt.slice(0, 29) + '…';
        tdiv.appendChild(document.createTextNode(' '));
        tdiv.appendChild(el('span', { class: 'cfg-term-expr' }, exprTxt));
      }
      div.appendChild(tdiv);
      nodeEls.set(b.id, div);
    }

    // Estimate node heights without DOM measurement.
    const BOX_W = 240, GAP_X = 40, GAP_Y = 60;
    const HEADER_H = 26, FOOTER_H = 24, LINE_H = 18, BODY_PAD = 10;
    function estHeight(b) {
      const bodyLines = Math.max(1, b.statements.length);
      return HEADER_H + BODY_PAD + bodyLines * LINE_H + FOOTER_H;
    }
    for (const [id, divEl] of nodeEls) {
      divEl.style.width = BOX_W + 'px';
      stage.appendChild(divEl);
    }
    const sizes = new Map();
    for (const b of blocks) sizes.set(b.id, { w: BOX_W, h: estHeight(b) });

    const byLevel = {};
    for (const id of Object.keys(level)) {
      const l = level[+id];
      if (!byLevel[l]) byLevel[l] = [];
      byLevel[l].push(+id);
    }
    for (const l of Object.keys(byLevel)) byLevel[l].sort((a, b) => a - b);
    let maxLevel = 0;
    for (const l of Object.keys(byLevel)) maxLevel = Math.max(maxLevel, +l);

    const rowH = [];
    for (let l = 0; l <= maxLevel; l++) {
      let h = 60;
      for (const id of (byLevel[l] || [])) h = Math.max(h, sizes.get(id).h);
      rowH[l] = h;
    }
    const levelY = [];
    let yCursor = GAP_Y;
    for (let l = 0; l <= maxLevel; l++) {
      levelY[l] = yCursor;
      yCursor += rowH[l] + GAP_Y;
    }
    const totalH = yCursor;

    let maxCount = 0;
    for (const l of Object.keys(byLevel)) maxCount = Math.max(maxCount, byLevel[l].length);
    const totalW = Math.max(maxCount * BOX_W + Math.max(0, maxCount - 1) * GAP_X + 80, 480);

    const positions = new Map();
    for (let l = 0; l <= maxLevel; l++) {
      const row = byLevel[l] || [];
      const rowW = row.length * BOX_W + Math.max(0, row.length - 1) * GAP_X;
      const startX = (totalW - rowW) / 2;
      for (let i = 0; i < row.length; i++) {
        const id = row[i];
        const px = startX + i * (BOX_W + GAP_X);
        const py = levelY[l] + (rowH[l] - sizes.get(id).h) / 2;
        positions.set(id, { x: px, y: py, w: BOX_W, h: sizes.get(id).h });
        const divEl = nodeEls.get(id);
        divEl.style.left = px + 'px';
        divEl.style.top = py + 'px';
      }
    }

    stage.style.width = totalW + 'px';
    stage.style.height = totalH + 'px';

    svg.setAttribute('width', totalW);
    svg.setAttribute('height', totalH);
    const defs = document.createElementNS(svgNs, 'defs');
    function mkArrow(id, color) {
      const m = document.createElementNS(svgNs, 'marker');
      m.setAttribute('id', id);
      m.setAttribute('viewBox', '0 0 8 8');
      m.setAttribute('refX', '7');
      m.setAttribute('refY', '4');
      m.setAttribute('markerWidth', '7');
      m.setAttribute('markerHeight', '7');
      m.setAttribute('orient', 'auto');
      const p = document.createElementNS(svgNs, 'path');
      p.setAttribute('d', 'M 0 0 L 8 4 L 0 8 z');
      p.setAttribute('fill', color);
      m.appendChild(p);
      defs.appendChild(m);
    }
    mkArrow('cfg-arr-default', '#6b7280');
    mkArrow('cfg-arr-true',    '#16a34a');
    mkArrow('cfg-arr-false',   '#dc2626');
    mkArrow('cfg-arr-back',    '#9333ea');
    svg.appendChild(defs);

    function markerFor(e) {
      if (e.back) return 'url(#cfg-arr-back)';
      if (e.kind === 'true')  return 'url(#cfg-arr-true)';
      if (e.kind === 'false') return 'url(#cfg-arr-false)';
      return 'url(#cfg-arr-default)';
    }

    const outCount = {};
    for (const e of edges) outCount[e.from] = (outCount[e.from] || 0) + 1;

    function refreshEdges() {
      svg.querySelectorAll(':scope > path, :scope > text').forEach(n => n.remove());
      const outIdx = {};
      for (const e of edges) {
        const src = positions.get(e.from);
        const dst = positions.get(e.to);
        if (!src || !dst) continue;
        const idx = (outIdx[e.from] = (outIdx[e.from] || 0));
        outIdx[e.from] = idx + 1;
        const total = outCount[e.from];
        const offsetX = total > 1 ? (idx - (total - 1) / 2) * (src.w / (total + 1)) : 0;

        let x1, y1, x2, y2, c1x, c1y, c2x, c2y;
        if (e.back) {
          x1 = src.x + src.w;
          y1 = src.y + src.h / 2;
          x2 = dst.x + dst.w;
          y2 = dst.y + dst.h / 2;
          const bulge = Math.max(40, Math.abs(y2 - y1) * 0.4);
          c1x = x1 + bulge; c1y = y1;
          c2x = x2 + bulge; c2y = y2;
        } else {
          x1 = src.x + src.w / 2 + offsetX;
          y1 = src.y + src.h;
          x2 = dst.x + dst.w / 2;
          y2 = dst.y;
          const mid = (y1 + y2) / 2;
          c1x = x1; c1y = mid;
          c2x = x2; c2y = mid;
        }
        const path = document.createElementNS(svgNs, 'path');
        path.setAttribute('d', `M ${x1} ${y1} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${x2} ${y2}`);
        if (e.back) path.classList.add('cfg-edge-back');
        else path.classList.add('cfg-edge-' + e.kind);
        path.setAttribute('marker-end', markerFor(e));
        svg.appendChild(path);

        if (e.label) {
          const text = document.createElementNS(svgNs, 'text');
          text.setAttribute('class', 'cfg-edge-label');
          let lx, ly;
          if (e.back) { lx = Math.max(c1x, c2x) - 4; ly = (y1 + y2) / 2; }
          else        { lx = (x1 + x2) / 2 + 6;       ly = (y1 + y2) / 2 - 2; }
          text.setAttribute('x', lx);
          text.setAttribute('y', ly);
          text.textContent = e.label;
          svg.appendChild(text);
        }
      }
    }
    refreshEdges();

    // Dragging.
    for (const [id, divEl] of nodeEls) {
      divEl.style.cursor = 'grab';
      divEl.addEventListener('mousedown', (ev) => {
        if (window.getSelection && String(window.getSelection())) return;
        ev.preventDefault();
        divEl.style.cursor = 'grabbing';
        const pos = positions.get(id);
        const startMouseX = ev.clientX;
        const startMouseY = ev.clientY;
        const startPosX = pos.x;
        const startPosY = pos.y;
        function onMove(ev2) {
          const nx = Math.max(0, startPosX + (ev2.clientX - startMouseX));
          const ny = Math.max(0, startPosY + (ev2.clientY - startMouseY));
          pos.x = nx;
          pos.y = ny;
          divEl.style.left = nx + 'px';
          divEl.style.top  = ny + 'px';
          refreshEdges();
        }
        function onUp() {
          divEl.style.cursor = 'grab';
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
        }
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      });
    }

    const canvas = el('div', { class: 'cfg-canvas' });
    canvas.appendChild(stage);
    const legend = el('div', { class: 'mute',
      style: { fontSize: '11px', marginTop: '6px', display: 'flex', gap: '14px', flexWrap: 'wrap' } },
      el('span', {}, '🟩 entry'),
      el('span', { style: { color: '#16a34a' } }, '→ T (true)'),
      el('span', { style: { color: '#dc2626' } }, '→ F (false)'),
      el('span', { style: { color: '#6b7280' } }, '→ unconditional'),
      el('span', { style: { color: '#9333ea' } }, '⤴ back-edge'),
      el('span', { class: 'mute' }, '· drag any block to reposition'),
    );
    const out = el('div');
    out.appendChild(canvas);
    out.appendChild(legend);
    return out;
  }

  // ── Locals ──
  function renderLocals(panel, trace) {
    panel.appendChild(el('div', { class: 'hint' },
      'Wasm runs on a stack-plus-locals model: each function has a fixed ' +
      'array of typed local slots (function parameters first, declared ' +
      'locals after). c0 allocates one local per source variable up front — ' +
      'the local index of `x` is fixed for the whole function, and every ' +
      'read/write becomes `local.get/set <that index>`. If the function ' +
      'contains a switch, one extra i32 scratch local is appended.'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'The allocation'));
    panel.appendChild(makeCatalog([
      { cat: 'fixed',     name: 'function params',
        desc: 'parameters.length entries at indices 0..N-1. Wasm puts them in the same slots as named locals — there\'s no separate "params" array in the encoded function body.' },
      { cat: 'allocated', name: 'Declare locals',
        desc: 'Every `T x = ...;` in the function body gets the next free local. Same slot persists for the lifetime of the function — c0 has no scoping for locals; you can\'t shadow.' },
      { cat: 'allocated', name: '$swScratch',
        desc: 'One extra i32 local appended if the function contains any switch statement. Holds the switch\'s value across the dispatch chain so it\'s not recomputed per-case.' },
    ]));

    panel.appendChild(el('div', { class: 'callout' },
      el('strong', {}, 'No SSA, no coalescing. '),
      'Every assignment to source-level `i` writes the same wasm local. ' +
      'The sibling c2 backend (SSA) gives each definition a fresh Value ' +
      'and routes joins through block parameters — typically inflating ' +
      'the local count, then giving an optimizer cleaner material to ' +
      'shrink it back down. c0 trades codegen quality (some redundant ' +
      'local.set pairs) for IR simplicity.'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'Source reference'));
    const src = makePhaseSourceBlock('c0-locals',
      'Derivation: layoutFor() — CODEGEN.emit\'s inner helper');
    if (src) panel.appendChild(src);

    panel.appendChild(el('h2', { class: 'section-title' }, 'Local allocation for the current source'));
    for (const fn of trace.ast.functions) {
      const layout = trace.fnTraces.get(fn.name);
      if (!layout) continue;
      const group = el('div', { class: 'fn-group' });
      const total = layout.params.length + layout.locals.length;
      group.appendChild(el('h3', {}, fn.name,
        el('span', { class: 'sub' }, '  (' + total + ' wasm locals total)')));
      const tbl = el('table', { class: 'kv' });
      tbl.appendChild(el('tr', {},
        el('th', {}, 'local'),
        el('th', {}, 'type'),
        el('th', {}, 'origin'),
        el('th', {}, 'name')));
      const rows = [...layout.params, ...layout.locals];
      for (const r of rows) {
        tbl.appendChild(el('tr', {},
          el('td', { class: 'num mono' }, String(r.idx)),
          el('td', { class: 'type mono' }, r.type),
          el('td', { class: 'mute' }, r.origin),
          el('td', { class: 'mono' }, r.name)));
      }
      group.appendChild(tbl);
      panel.appendChild(group);
    }
  }

  // ── wasm (module summary + per-function disasm) ──
  function fmtBytes(arr, max = 8) {
    let s = '';
    for (let i = 0; i < Math.min(arr.length, max); i++) {
      s += arr[i].toString(16).padStart(2, '0') + ' ';
    }
    if (arr.length > max) s += '…';
    return s.trim();
  }

  function renderModuleSummary(panel, trace) {
    const d = DISASM.disassemble(trace.bytes);
    const group = el('div', { class: 'fn-group' });
    group.appendChild(el('h3', {}, 'Module summary',
      el('span', { class: 'sub' }, '  ' + trace.bytes.length + ' bytes')));

    const secTable = el('table', { class: 'kv' });
    secTable.appendChild(el('tr', {},
      el('th', {}, 'section'),
      el('th', {}, 'id'),
      el('th', {}, 'size (B)')));
    for (const s of d.sections) {
      secTable.appendChild(el('tr', {},
        el('td', { class: 'kw mono' }, s.name),
        el('td', { class: 'num mono' }, String(s.id)),
        el('td', { class: 'num mono' }, String(s.length))));
    }
    group.appendChild(secTable);

    group.appendChild(el('h2', { class: 'section-title' }, 'Function types'));
    if (d.types.length === 0) {
      group.appendChild(el('div', { class: 'mute mono' }, '(none)'));
    } else {
      const tt = el('table', { class: 'kv' });
      tt.appendChild(el('tr', {},
        el('th', {}, 'idx'), el('th', {}, 'sig')));
      d.types.forEach((ty, i) => {
        tt.appendChild(el('tr', {},
          el('td', { class: 'num mono' }, String(i)),
          el('td', { class: 'mono' }, DISASM.typeToString(ty, i))));
      });
      group.appendChild(tt);
    }

    group.appendChild(el('h2', { class: 'section-title' }, 'Exports'));
    if (d.exports.length === 0) {
      group.appendChild(el('div', { class: 'mute mono' }, '(none)'));
    } else {
      const et = el('table', { class: 'kv' });
      et.appendChild(el('tr', {},
        el('th', {}, 'name'), el('th', {}, 'kind'), el('th', {}, 'idx')));
      for (const ex of d.exports) {
        et.appendChild(el('tr', {},
          el('td', { class: 'mono' }, ex.name),
          el('td', { class: 'mute' }, ex.kind),
          el('td', { class: 'num mono' }, String(ex.idx))));
      }
      group.appendChild(et);
    }
    panel.appendChild(group);
    return d;
  }

  // Lightweight body walker that tokenizes the raw bytes for display.
  function walkBodyDirect(u8) {
    const out = [];
    let p = 0;
    function uleb() {
      let r = 0n, s = 0n;
      while (true) {
        const b = u8[p++];
        r |= BigInt(b & 0x7F) << s;
        if ((b & 0x80) === 0) return Number(r);
        s += 7n;
      }
    }
    function sleb() {
      let r = 0n, s = 0n, b = 0;
      while (true) {
        b = u8[p++];
        r |= BigInt(b & 0x7F) << s;
        s += 7n;
        if ((b & 0x80) === 0) break;
      }
      if ((b & 0x40) !== 0) r |= -(1n << s);
      return r;
    }
    while (p < u8.length) {
      const start = p;
      const op = u8[p++];
      let entry;
      switch (op) {
        case 0x00: entry = { op: 'unreachable' }; break;
        case 0x01: entry = { op: 'nop' }; break;
        case 0x02: { const bt = u8[p++]; entry = { op: 'block', blockType: bt }; break; }
        case 0x03: { const bt = u8[p++]; entry = { op: 'loop',  blockType: bt }; break; }
        case 0x04: { const bt = u8[p++]; entry = { op: 'if',    blockType: bt }; break; }
        case 0x05: entry = { op: 'else' }; break;
        case 0x0B: entry = { op: 'end' }; break;
        case 0x0C: entry = { op: 'br', target: uleb() }; break;
        case 0x0D: entry = { op: 'br_if', target: uleb() }; break;
        case 0x0F: entry = { op: 'return' }; break;
        case 0x10: entry = { op: 'call', funcidx: uleb() }; break;
        case 0x20: entry = { op: 'local.get', idx: uleb() }; break;
        case 0x21: entry = { op: 'local.set', idx: uleb() }; break;
        case 0x22: entry = { op: 'local.tee', idx: uleb() }; break;
        case 0x41: entry = { op: 'i32.const', value: sleb() }; break;
        case 0x42: entry = { op: 'i64.const', value: sleb() }; break;
        case 0x43: { const v = u8.slice(p, p + 4); p += 4; entry = { op: 'f32.const', bytes: v }; break; }
        case 0x44: { const v = u8.slice(p, p + 8); p += 8; entry = { op: 'f64.const', bytes: v }; break; }
        case 0x45: entry = { op: 'i32.eqz' }; break;
        default:   entry = { op: _opcodeName(op) || ('op_0x' + op.toString(16)) };
      }
      entry.offset = start;
      entry.bytes = u8.slice(start, p);
      out.push(entry);
    }
    return out;
  }

  // Names for the arithmetic/compare opcodes c0.js emits.
  const _SINGLE_OP_NAMES = {
    0x46: 'i32.eq',  0x47: 'i32.ne',
    0x48: 'i32.lt_s',0x4A: 'i32.gt_s',
    0x4C: 'i32.le_s',0x4E: 'i32.ge_s',
    0x6A: 'i32.add', 0x6B: 'i32.sub', 0x6C: 'i32.mul',
    0x6D: 'i32.div_s', 0x6F: 'i32.rem_s',
    0x51: 'i64.eq',  0x52: 'i64.ne',
    0x53: 'i64.lt_s',0x55: 'i64.gt_s',
    0x57: 'i64.le_s',0x59: 'i64.ge_s',
    0x7C: 'i64.add', 0x7D: 'i64.sub', 0x7E: 'i64.mul',
    0x7F: 'i64.div_s', 0x81: 'i64.rem_s',
    0x5B: 'f32.eq',  0x5C: 'f32.ne',
    0x5D: 'f32.lt',  0x5E: 'f32.gt',
    0x5F: 'f32.le',  0x60: 'f32.ge',
    0x8C: 'f32.neg', 0x9A: 'f64.neg',
    0x92: 'f32.add', 0x93: 'f32.sub', 0x94: 'f32.mul', 0x95: 'f32.div',
    0x61: 'f64.eq',  0x62: 'f64.ne',
    0x63: 'f64.lt',  0x64: 'f64.gt',
    0x65: 'f64.le',  0x66: 'f64.ge',
    0xA0: 'f64.add', 0xA1: 'f64.sub', 0xA2: 'f64.mul', 0xA3: 'f64.div',
  };
  function _opcodeName(op) { return _SINGLE_OP_NAMES[op]; }

  function instAsmText(i) {
    if (i.op === 'i32.const' || i.op === 'i64.const') return `${i.op} ${i.value}`;
    if (i.op === 'f32.const' || i.op === 'f64.const') return `${i.op} <${i.bytes.length} bytes>`;
    if (i.op === 'local.get' || i.op === 'local.set' || i.op === 'local.tee') return `${i.op} ${i.idx}`;
    if (i.op === 'br' || i.op === 'br_if') return `${i.op} ${i.target}`;
    if (i.op === 'call') return `${i.op} ${i.funcidx}`;
    if (i.op === 'block' || i.op === 'loop' || i.op === 'if') {
      return `${i.op}${i.blockType === 0x40 ? '' : ' bt=0x' + i.blockType.toString(16)}`;
    }
    return i.op;
  }

  function renderFnDisasm(fnInfo) {
    const group = el('div', { class: 'fn-group' });
    group.appendChild(el('h3', {}, fnInfo.name,
      el('span', { class: 'sub' },
        '  body=' + fnInfo.body.length + 'B,  locals=' + fnInfo.extraTypes.length +
        ' (+' + fnInfo.paramTypes.length + ' params)')));

    if (fnInfo.extraTypes.length > 0) {
      const runs = [];
      for (const ty of fnInfo.extraTypes) {
        if (runs.length && runs[runs.length - 1].type === ty) runs[runs.length - 1].count++;
        else runs.push({ count: 1, type: ty });
      }
      const txt = '(' + runs.map(r => r.count + '×' + r.type).join(', ') + ')';
      group.appendChild(el('div', { class: 'mono mute', style: { marginBottom: '8px' } },
        'declared locals: ' + txt));
    }

    const insts = walkBodyDirect(fnInfo.body);
    let indent = 0;
    const lines = [];
    for (const i of insts) {
      if (i.op === 'end') indent = Math.max(0, indent - 1);
      lines.push({
        offset: i.offset,
        bytes: i.bytes,
        text: instAsmText(i),
        indent,
      });
      if (i.op === 'block' || i.op === 'loop' || i.op === 'if') indent++;
    }

    const dbox = el('div');
    for (const ln of lines) {
      const row = el('div', { class: 'disasm-line' });
      row.appendChild(el('div', { class: 'disasm-offset' },
        ln.offset.toString().padStart(4) + ':'));
      row.appendChild(el('div', { class: 'disasm-bytes' }, fmtBytes(ln.bytes)));
      row.appendChild(el('div', { class: 'disasm-asm' },
        '  '.repeat(ln.indent) + ln.text));
      dbox.appendChild(row);
    }
    group.appendChild(dbox);
    return group;
  }

  function renderAsm(panel, trace) {
    panel.appendChild(el('div', { class: 'hint' },
      'The final emit phase. The module header (magic + version) is followed ' +
      'by sections — each tagged with a numeric ID and length-prefixed. c0 ' +
      'emits the same four sections every time; everything else (memory, ' +
      'tables, globals, custom name section, …) is omitted.'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'Sections emitted'));
    panel.appendChild(makeCatalog([
      { cat: 'id=1',  name: 'type',     desc: 'Interned function signatures. Each function in the module references one entry by index.' },
      { cat: 'id=3',  name: 'function', desc: 'For each defined function, its type-section index.' },
      { cat: 'id=7',  name: 'export',   desc: 'Names visible to the host. Every function is exported under its source name.' },
      { cat: 'id=10', name: 'code',     desc: 'Per-function body: a run-length-encoded locals declaration followed by the body bytes (the emit phase\'s output) and a final 0x0B.' },
    ]));

    panel.appendChild(el('div', { class: 'callout' },
      el('strong', {}, 'The c0 emit walk. '),
      'c0\'s emitter is a direct AST → wasm walk — ',
      el('strong', {}, 'no CFG, no SSA, no analyses. '),
      'For each function: walk the AST body, emitting bytes as we go. ' +
      'Structured control (if/while/switch) maps directly onto wasm\'s ' +
      'native `block`/`loop`/`if`/`br`/`br_if`. The CFG.fromAST path ' +
      'exists for visualization and round-trip experiments but isn\'t in ' +
      'the hot compile path. Sources that use goto are first lifted via ' +
      'CFG.intoAST(CFG.fromAST(prog)) into a while-switch form, then ' +
      'emitted.'));

    panel.appendChild(el('h2', { class: 'section-title' }, 'Source reference'));
    const src = makePhaseSourceBlock('c0-emit',
      'Derivation: CODEGEN.emit() — AST → wasm bytes');
    if (src) panel.appendChild(src);

    panel.appendChild(el('h2', { class: 'section-title' }, 'Compiled binary'));

    if (!trace.bytes) {
      panel.appendChild(el('div', { class: 'mute mono' },
        '(emit failed: ' + (trace.bytesError?.message || 'unknown') + ')'));
      return;
    }

    panel.appendChild(el('div', { class: 'hint muted' },
      'Indentation tracks block/loop/if nesting.'));
    const d = renderModuleSummary(panel, trace);
    // Map each disasm function to its body bytes + locals types.
    for (let i = 0; i < d.functions.length; i++) {
      const fnD = d.functions[i];
      const astFn = trace.ast.functions[i];
      panel.appendChild(renderFnDisasm({
        name: astFn ? astFn.name : ('fn[' + i + ']'),
        body: fnD.body,
        extraTypes: fnD.locals.flatMap(g => Array(g.count).fill(DISASM.valueTypeToString(g.type))),
        paramTypes: astFn ? astFn.parameters.map(p => p.type) : [],
      }));
    }
  }

  // ──────────── Pipeline (static explainer) ────────────

  const PHASES = [
    { key: 'lex', tabId: 'tokens', title: 'Lexer',
      sub: 'characters → tokens',
      summary:
        'Walks the source string left-to-right, producing a flat array of ' +
        'tokens. Each token carries its type tag, value, and source line/col. ' +
        'Whitespace and `//` comments are skipped; the lexer has at most ' +
        'one character of lookahead (for `==`, `!=`, `<=`, `>=`).',
      ioIn: 'source: string',
      ioOut: 'tokens: Token[]' },
    { key: 'parse', tabId: 'ast', title: 'Parser',
      sub: 'tokens → AST',
      summary:
        'Recursive descent over the token stream, with precedence-climbing for ' +
        'expressions. parseProgram yields an AST.Program of Functions; each ' +
        'Function has typed parameters and a Block body. Variables resolve ' +
        'into shared AST.Variable instances via a per-function scope map — ' +
        'the same instance appears at the declaration AND every reference.',
      ioIn: 'tokens: Token[]',
      ioOut: 'ast: AST.Program' },
    { key: 'c0-lower', tabId: 'cfg', title: 'Lower to CFG',
      sub: 'AST → statement-CFG',
      summary:
        'Walks each function with a "current block" cursor. Straight-line code ' +
        '(Assign + Declare-with-initializer) pushes AST.Assign nodes into the ' +
        'block as-is; control-flow constructs (If/While/Switch/Break/Return/' +
        'Goto) open fresh blocks and connect them with terminators. Labels are ' +
        'pre-allocated in a scan so forward gotos resolve.',
      ioIn: 'ast: AST.Program',
      ioOut: 'mod: CFG.Module' },
    { key: 'c0-lift', tabId: 'lifted', title: 'Lift CFG back to AST',
      sub: 'CFG → AST.Program (while-switch form)',
      summary:
        'Round-trips the CFG back into structured c0 source by emitting a ' +
        '`while (1) { switch (__state) { case ID: … } }` dispatcher per ' +
        'function. Each block\'s terminator becomes either a state-assignment ' +
        '+ break or a return. Useful for visualization AND for compiling goto-' +
        'based sources (which CODEGEN.emit rejects directly).',
      ioIn: 'mod: CFG.Module',
      ioOut: 'lifted: AST.Program' },
    { key: 'c0-locals', tabId: 'locals', title: 'Discover locals',
      sub: 'AST.Function → wasm local layout',
      summary:
        'Walk the AST once; for each function parameter and each Declare, ' +
        'assign a wasm local index. Flat scope: redeclaring a name anywhere ' +
        'in the function is an error. If the function contains a switch, an ' +
        'extra i32 scratch local is appended (used to stash the switch ' +
        'value across the dispatch chain). Runs inside CODEGEN.emit.',
      ioIn: 'astFn: AST.Function',
      ioOut: 'Map<varName, localIdx> + declared types[]' },
    { key: 'c0-emit', tabId: 'asm', title: 'Emit body bytes',
      sub: 'AST → wasm bytes (direct)',
      summary:
        'A direct AST → wasm walk per function. Structured control flow ' +
        '(if/while/switch) maps onto wasm\'s native block/loop/if/br/br_if ' +
        'instructions. Expressions emit recursively in stack-machine order: ' +
        'left, right, op-byte. Sources that use label/goto can\'t be emitted ' +
        'directly — they\'re first round-tripped through lower→lift.',
      ioIn: 'AST.Program',
      ioOut: 'bytes: Uint8Array' },
  ];

  function renderPipeline(panel, _trace) {
    if (BACKEND !== 'c0') {
      panel.appendChild(el('div', { class: 'hint' },
        'The Pipeline explainer covers the ',
        el('span', { class: 'mono' }, 'c0'),
        ' backend. The pipeline for ',
        el('span', { class: 'mono' }, BACKEND),
        ' (and its detail tabs) is not yet wired into the visualizer — ' +
        'switch the Backend selector back to c0 to read the explainer.'));
      return;
    }
    panel.appendChild(el('div', { class: 'hint' },
      'The full c0 compiler pipeline. Each stage maps to one detail tab; ' +
      'clicking a stage opens its detail tab in the pane opposite ' +
      'Pipeline\'s — so you can keep this explainer open while inspecting ' +
      'the live phase output side-by-side.'));

    const flow = el('div', { class: 'pipeline-flow' });
    const stages = [
      { label: 'source',     tabId: 'source'    },
      { label: 'tokens',     tabId: 'tokens'    },
      { label: 'AST',        tabId: 'ast'       },
      { label: 'CFG',        tabId: 'cfg'       },
      { label: 'Lifted AST', tabId: 'lifted'    },
      { label: 'locals',     tabId: 'locals'    },
      { label: 'wasm bytes', tabId: 'asm'       },
    ];
    stages.forEach((s, i) => {
      if (i > 0) flow.appendChild(el('span', { class: 'phase-arrow' }, '→'));
      const box = el('span', { class: 'phase-box', title: `Open ${s.label} detail in opposite pane` }, s.label);
      box.addEventListener('click', () => openInOppositePane(s.tabId));
      flow.appendChild(box);
    });
    panel.appendChild(flow);

    panel.appendChild(el('div', { class: 'callout' },
      el('strong', {}, 'Two emit paths. '),
      'The direct path (PARSER.parse → CODEGEN.emit) runs every keystroke ' +
      'for structured sources. The lift path (PARSER.parse → CFG.fromAST → ' +
      'CFG.intoAST → CODEGEN.emit) is what makes label/goto work — gotos ' +
      'can\'t be emitted directly, but after a round-trip through the CFG ' +
      'they come out as a structured while-switch dispatcher that emit ' +
      'accepts.'));

    for (const p of PHASES) {
      const card = el('div', { class: 'phase-card', 'data-phase': p.key });
      const head = el('div', { class: 'phase-card-head' });
      head.appendChild(el('h3', {}, p.title));
      if (p.tabId) {
        const btn = el('span', {
          class: 'openbtn',
          title: `Open the ${p.tabId} tab in opposite pane`,
        }, 'Open ' + p.tabId + ' ↗');
        btn.addEventListener('click', () => openInOppositePane(p.tabId));
        head.appendChild(btn);
      }
      card.appendChild(head);
      card.appendChild(el('div', { class: 'phase-sub' }, p.sub));
      card.appendChild(el('div', { class: 'phase-summary' }, p.summary));
      const io = el('div', { class: 'phase-io' });
      io.appendChild(el('span', { class: 'io-label' }, 'in'));
      io.appendChild(el('span', { class: 'io-shape' }, p.ioIn));
      io.appendChild(el('span', { class: 'io-arrow' }, '→'));
      io.appendChild(el('span', { class: 'io-label' }, 'out'));
      io.appendChild(el('span', { class: 'io-shape' }, p.ioOut));
      card.appendChild(io);
      const src = SNIPPETS_HTML[p.key];
      if (src) {
        const pre = el('pre', { class: 'phase-code' });
        pre.innerHTML = src;
        card.appendChild(pre);
      } else {
        card.appendChild(el('div', { class: 'mute mono' },
          `(snippet "${p.key}" not found in c0.js — re-run build.py)`));
      }
      panel.appendChild(card);
    }
  }

  // ──────────── tab registry ────────────

  TAB_DEFS.push(
    { id: 'pipeline',    label: 'Pipeline',      render: renderPipeline, static: true },
    { id: 'source',      label: 'Source',        render: null,           static: true },
    { id: 'tokens',      label: 'Tokens',        render: renderTokens },
    { id: 'ast',         label: 'AST',           render: renderAst },
    { id: 'cfg',         label: 'CFG',           render: renderCfg },
    { id: 'lifted',      label: 'Lifted',        render: renderLifted },
    { id: 'locals',      label: 'Locals',        render: renderLocals },
    { id: 'asm',         label: 'wasm',          render: renderAsm },
  );

  for (const def of TAB_DEFS) {
    const button = el('button',
      { 'data-tab': def.id, draggable: 'true' }, def.label);
    const panel = el('div', { class: 'panel', 'data-tab': def.id });
    button.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', def.id);
      e.dataTransfer.effectAllowed = 'move';
      button.classList.add('dragging');
    });
    button.addEventListener('dragend', () => button.classList.remove('dragging'));
    tabs.set(def.id, { button, panel, def });
  }

  // Source tab: the textarea + highlighted overlay + errors div live
  // inside this panel permanently (avoiding remount overhead). The whole
  // subtree moves between panes when the user drags the Source tab.
  {
    const srcPanel = tabs.get('source').panel;
    const tmpl = document.getElementById('source-boot');
    srcPanel.appendChild(tmpl.content.cloneNode(true));
  }

  // ──────────── backend state ────────────
  //
  // BACKENDS_AVAILABLE is set by build.py based on which cX.js files were
  // bundled. The header <select> is populated from it; the active one is
  // restored from localStorage when possible, else the first available.
  const BACKENDS_AVAILABLE = window.BACKENDS_AVAILABLE || ['c0'];
  let BACKEND = BACKENDS_AVAILABLE[0];
  function activeCompiler() {
    if (BACKEND === 'c0') return window.C0;
    if (BACKEND === 'c1') return window.C1;
    if (BACKEND === 'c2') return window.C2;
    return window.C0;
  }

  // ──────────── pane state + apply ────────────

  const PANE_EL = {
    paneA: document.getElementById('paneA'),
    paneB: document.getElementById('paneB'),
  };
  // Default layout: Pipeline + Source on the left (Pipeline active so the
  // user lands on the overview), every other tab on the right with Tokens
  // active. openInOppositePane targets the pane OPPOSITE to Pipeline's,
  // so Pipeline clicks open detail tabs on the right pane.
  const paneState = (() => {
    const leftIds = ['pipeline', 'source'];
    const rightIds = TAB_DEFS.map(d => d.id).filter(id => !leftIds.includes(id));
    return {
      paneA: { tabIds: leftIds, active: 'pipeline' },
      paneB: { tabIds: rightIds, active: rightIds[0] || null },
    };
  })();

  function applyPane(paneId) {
    const pane = PANE_EL[paneId];
    const state = paneState[paneId];
    const tabBar = pane.querySelector('.pane-tabs');
    const panelBox = pane.querySelector('.pane-panels');
    clear(tabBar);
    clear(panelBox);
    if (state.tabIds.length === 0) {
      pane.classList.add('empty');
      panelBox.appendChild(el('div', { class: 'empty-pane-hint' },
        'Drag a tab from the other pane here to split the view.'));
      return;
    }
    pane.classList.remove('empty');
    if (!state.tabIds.includes(state.active)) state.active = state.tabIds[0];
    for (const tabId of state.tabIds) {
      const t = tabs.get(tabId);
      tabBar.appendChild(t.button);
      panelBox.appendChild(t.panel);
      const isActive = tabId === state.active;
      t.button.classList.toggle('active', isActive);
      t.panel.classList.toggle('active', isActive);
      t.button.onclick = () => {
        state.active = tabId;
        applyPane(paneId);
        saveLayout();
      };
    }
  }

  function openInOppositePane(tabId) {
    let pipelinePane = null;
    for (const pid of ['paneA', 'paneB']) {
      if (paneState[pid].tabIds.includes('pipeline')) { pipelinePane = pid; break; }
    }
    const targetPane = pipelinePane === 'paneA' ? 'paneB' : 'paneA';
    if (paneState[targetPane].tabIds.includes(tabId)) {
      paneState[targetPane].active = tabId;
      applyPane(targetPane);
      saveLayout();
    } else {
      moveTab(tabId, targetPane);
    }
  }

  // Cross-pane move OR same-pane reorder. `insertIdx` < 0 means append.
  // When the tab is already in the target pane at the requested index
  // (modulo its own removal from earlier in the list) we no-op.
  function moveTab(tabId, targetPaneId, insertIdx = -1) {
    let sourcePaneId = null;
    for (const pid of ['paneA', 'paneB']) {
      if (paneState[pid].tabIds.includes(tabId)) { sourcePaneId = pid; break; }
    }
    if (!sourcePaneId) return;
    const src = paneState[sourcePaneId];
    const tgt = paneState[targetPaneId];
    const samePane = (sourcePaneId === targetPaneId);
    const oldIdx = src.tabIds.indexOf(tabId);
    let i = insertIdx;
    if (i < 0) i = tgt.tabIds.length;
    // For same-pane reorder, removing the tab shifts later indices left
    // by 1. Normalize the requested index so dropping a tab onto its own
    // current slot is a no-op.
    if (samePane && oldIdx >= 0 && i > oldIdx) i--;
    if (samePane && oldIdx === i) return;
    src.tabIds = src.tabIds.filter(id => id !== tabId);
    if (src.active === tabId && !samePane) src.active = src.tabIds[0] || null;
    if (i > tgt.tabIds.length) i = tgt.tabIds.length;
    tgt.tabIds.splice(i, 0, tabId);
    tgt.active = tabId;
    if (!samePane) applyPane(sourcePaneId);
    applyPane(targetPaneId);
    saveLayout();
  }

  // ──────────── drop targets ────────────
  //
  // The `.pane-tabs` strip computes an insertion index from the mouse X
  // position relative to existing tab buttons (so dropping between two
  // tabs reorders correctly within the same pane). The `.pane-panels`
  // area is a coarser drop target that always appends.

  function computeDropIdx(tabBar, clientX) {
    const btns = [...tabBar.querySelectorAll('button')];
    for (let i = 0; i < btns.length; i++) {
      const r = btns[i].getBoundingClientRect();
      if (clientX < r.left + r.width / 2) return i;
    }
    return btns.length;
  }

  function clearDropIndicators(tabBar) {
    tabBar.querySelectorAll('button.drop-before, button.drop-after')
      .forEach(b => b.classList.remove('drop-before', 'drop-after'));
  }

  function paintDropIndicator(tabBar, idx) {
    clearDropIndicators(tabBar);
    const btns = [...tabBar.querySelectorAll('button')];
    if (btns.length === 0) return;
    if (idx < btns.length) btns[idx].classList.add('drop-before');
    else btns[btns.length - 1].classList.add('drop-after');
  }

  for (const paneId of ['paneA', 'paneB']) {
    const pane = PANE_EL[paneId];
    const tabBar = pane.querySelector('.pane-tabs');
    const panelBox = pane.querySelector('.pane-panels');

    tabBar.addEventListener('dragover', e => {
      if (!e.dataTransfer.types.includes('text/plain')) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      tabBar.classList.add('drop-active');
      const idx = computeDropIdx(tabBar, e.clientX);
      tabBar.dataset.dropIdx = String(idx);
      paintDropIndicator(tabBar, idx);
    });
    tabBar.addEventListener('dragleave', e => {
      // Only clear when leaving the tab bar entirely, not when crossing
      // between child buttons.
      if (!tabBar.contains(e.relatedTarget)) {
        tabBar.classList.remove('drop-active');
        clearDropIndicators(tabBar);
        delete tabBar.dataset.dropIdx;
      }
    });
    tabBar.addEventListener('drop', e => {
      e.preventDefault();
      tabBar.classList.remove('drop-active');
      clearDropIndicators(tabBar);
      const tabId = e.dataTransfer.getData('text/plain');
      const idx = tabBar.dataset.dropIdx !== undefined
        ? parseInt(tabBar.dataset.dropIdx, 10) : -1;
      delete tabBar.dataset.dropIdx;
      if (tabId) moveTab(tabId, paneId, idx);
    });

    panelBox.addEventListener('dragover', e => {
      if (!e.dataTransfer.types.includes('text/plain')) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      panelBox.classList.add('drop-active');
    });
    panelBox.addEventListener('dragleave', () => panelBox.classList.remove('drop-active'));
    panelBox.addEventListener('drop', e => {
      e.preventDefault();
      panelBox.classList.remove('drop-active');
      const tabId = e.dataTransfer.getData('text/plain');
      if (tabId) moveTab(tabId, paneId);
    });
  }

  // ──────────── resize dividers ────────────
  for (const div of document.querySelectorAll('.divider')) {
    div.addEventListener('mousedown', e => {
      e.preventDefault();
      div.classList.add('dragging');
      const targetEl = document.getElementById(div.dataset.resize);
      const startX = e.clientX;
      const startW = targetEl.getBoundingClientRect().width;
      function onMove(ev) {
        const dx = ev.clientX - startX;
        const w = Math.max(150, startW + dx);
        targetEl.style.flexBasis = w + 'px';
      }
      function onUp() {
        div.classList.remove('dragging');
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
        saveLayout();
      }
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });
  }

  // ──────────── layout persistence ────────────
  // v2: removed 'source-view' tab, reordered defaults (pipeline+source
  // on the left). Older saved layouts referenced 'source-view' and would
  // restore a tab that no longer exists.
  //
  // The active BACKEND is intentionally NOT persisted — fresh reloads
  // always land on c0 (the visualizer's primary backend). c1 / c2 are
  // listed in the dropdown but show TBD content for now; persisting a
  // selection there would only confuse on reload.
  const LS_KEY = 'c0-viz-layout-v2';
  function saveLayout() {
    try {
      const data = {
        paneAW: document.getElementById('paneA').getBoundingClientRect().width,
        paneA: paneState.paneA,
        paneB: paneState.paneB,
      };
      localStorage.setItem(LS_KEY, JSON.stringify(data));
    } catch (e) { /* ignore quota / disabled storage */ }
  }
  function loadLayout() {
    let data = null;
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (raw) data = JSON.parse(raw);
    } catch (e) {}
    if (!data) return;
    if (data.paneAW) document.getElementById('paneA').style.flexBasis = data.paneAW + 'px';
    if (data.paneA && data.paneB) {
      const valid = new Set(TAB_DEFS.map(d => d.id));
      const a = (data.paneA.tabIds || []).filter(id => valid.has(id));
      const b = (data.paneB.tabIds || []).filter(id => valid.has(id));
      const used = new Set([...a, ...b]);
      for (const id of valid) if (!used.has(id)) a.push(id);
      paneState.paneA = { tabIds: a, active: a.includes(data.paneA.active) ? data.paneA.active : (a[0] || null) };
      paneState.paneB = { tabIds: b, active: b.includes(data.paneB.active) ? data.paneB.active : (b[0] || null) };
    }
  }

  // ──────────── render dispatch ────────────
  //
  // When BACKEND !== 'c0', the dynamic tabs show a TBD placeholder instead
  // of running their c0-specific renderers (which assume the c0 IR shape:
  // BasicBlock.statements as AST.Assigns, BrIf.cond as an AST expression
  // tree, etc.). c1/c2 round-trip and emit fine via Node — they just
  // don't have visualizer integration yet.
  function renderTbd(panel, def) {
    panel.appendChild(el('div', { class: 'hint' },
      'The ',
      el('strong', {}, def.label),
      ' tab for the ',
      el('span', { class: 'mono' }, BACKEND),
      ' backend is not yet wired into the visualizer. The compiler itself ' +
      'works end-to-end — exercise it via ',
      el('span', { class: 'mono' }, `node tests-${BACKEND}.js`),
      ' or by requiring ',
      el('span', { class: 'mono' }, `./${BACKEND}.js`),
      ' from Node. Switch the Backend selector back to c0 to use the visualizer.'));
  }
  function renderAll(trace) {
    for (const def of TAB_DEFS) {
      if (def.static) continue;
      const panel = tabs.get(def.id).panel;
      clear(panel);
      if (BACKEND !== 'c0') { renderTbd(panel, def); continue; }
      if (def.render) def.render(panel, trace);
    }
  }
  function renderError(_err) {
    for (const def of TAB_DEFS) {
      if (def.static || !def.render) continue;
      clear(tabs.get(def.id).panel);
    }
  }
  for (const def of TAB_DEFS) {
    if (def.static && def.render) {
      def.render(tabs.get(def.id).panel, null);
    }
  }

  // ──────────── source pipeline ────────────
  //
  // The Source tab is an overlay: a transparent <textarea> sits above a
  // syntax-highlighted <pre>. On every input we re-highlight; on every
  // scroll we mirror scrollTop/Left into the <pre>. The browser paints
  // glyphs from the <pre> at the same positions the textarea's caret
  // would sit on top of them — so the visible text APPEARS highlighted
  // but the actual editable element is still a plain textarea.

  const sourceEl     = tabs.get('source').panel.querySelector('#source');
  const sourcePreEl  = tabs.get('source').panel.querySelector('#source-pre');
  const errorsEl     = tabs.get('source').panel.querySelector('#errors');

  function refreshSourceHighlight() {
    // Trailing newline guard: when the textarea's value ends with `\n`,
    // browsers create a phantom blank line at the end; mirror that in
    // the <pre> by appending a space so the heights line up.
    const src = sourceEl.value;
    const padded = src.endsWith('\n') ? src + ' ' : src;
    sourcePreEl.innerHTML = highlightC0Source(padded);
  }

  function syncSourceScroll() {
    sourcePreEl.scrollTop  = sourceEl.scrollTop;
    sourcePreEl.scrollLeft = sourceEl.scrollLeft;
  }

  sourceEl.addEventListener('scroll', syncSourceScroll);

  function recompile() {
    refreshSourceHighlight();
    syncSourceScroll();
    // TBD backends (c1/c2): skip compileWithTrace entirely — the renderers
    // are c0-specific and would either crash or produce nonsense on the
    // c1/c2 IR shape. renderAll detects BACKEND !== 'c0' and shows a TBD
    // placeholder in each dynamic tab.
    if (BACKEND !== 'c0') {
      errorsEl.classList.add('hidden');
      clear(errorsEl);
      renderAll(null);
      return;
    }
    let trace;
    try {
      trace = activeCompiler().CODEGEN.compileWithTrace(sourceEl.value, '<editor>');
    } catch (e) {
      errorsEl.classList.remove('hidden');
      clear(errorsEl);
      errorsEl.appendChild(el('div', { class: 'err' }, e.message));
      renderError(e);
      return;
    }
    // Surface bytesError if direct + lift both failed.
    if (trace.bytesError) {
      errorsEl.classList.remove('hidden');
      clear(errorsEl);
      errorsEl.appendChild(el('div', { class: 'err' }, trace.bytesError.message));
    } else {
      errorsEl.classList.add('hidden');
      clear(errorsEl);
    }
    renderAll(trace);
  }

  // ──────────── backend selector ────────────
  const backendSelect = document.getElementById('backend-select');
  // Repopulate from BACKENDS_AVAILABLE (build.py controls this).
  clear(backendSelect);
  // Note: c1 is TAC (not SSA — that's c2); c2 uses the universal dispatcher,
  // not a structurizer. The visualizer hasn't been wired for c1/c2 yet, so
  // they're labeled TBD and render placeholder content when selected.
  const LABELS = {
    c0: 'c0 (statement-CFG)',
    c1: 'c1 (TAC — TBD)',
    c2: 'c2 (SSA — TBD)',
  };
  for (const k of BACKENDS_AVAILABLE) {
    backendSelect.appendChild(el('option', { value: k }, LABELS[k] || k));
  }
  backendSelect.addEventListener('change', () => {
    BACKEND = backendSelect.value;
    const pipelinePanel = tabs.get('pipeline').panel;
    clear(pipelinePanel);
    renderPipeline(pipelinePanel, null);
    recompile();
    saveLayout();
  });

  // ──────────── example dropdown ────────────
  const select = document.getElementById('example-select');
  for (const name of Object.keys(EXAMPLES)) {
    select.appendChild(el('option', { value: name }, name));
  }
  select.addEventListener('change', () => {
    sourceEl.value = EXAMPLES[select.value];
    recompile();
  });

  // ──────────── debounced auto-recompile ────────────
  //
  // Two concerns on every keystroke: (a) refresh the overlay highlight
  // synchronously so the user never sees stale glyphs through the
  // transparent textarea; (b) recompile + re-render detail tabs on a
  // debounce so we're not re-doing AST/CFG work mid-typing.
  let timer = null;
  sourceEl.addEventListener('input', () => {
    refreshSourceHighlight();
    syncSourceScroll();
    clearTimeout(timer);
    timer = setTimeout(recompile, 150);
  });

  // ──────────── boot ────────────
  loadLayout();
  if (backendSelect.value !== BACKEND) backendSelect.value = BACKEND;
  applyPane('paneA');
  applyPane('paneB');
  sourceEl.value = EXAMPLES[Object.keys(EXAMPLES)[0]];
  recompile();

  // Expose for tests / extensions.
  window.__viz = {
    TAB_DEFS, tabs, paneState, PANE_EL,
    renderAll, renderError, applyPane, moveTab, openInOppositePane, saveLayout,
    el, svgEl, clear, printExpr,
  };
})();
</script>

</body>
</html>
