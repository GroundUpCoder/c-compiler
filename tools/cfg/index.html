<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>c0 — statement-CFG visualizer</title>
<style>
  :root {
    --bg: #fafafa;
    --panel: #ffffff;
    --border: #d8d8d8;
    --border-strong: #888;
    --fg: #222;
    --fg-mute: #666;
    --accent: #2962ff;
    --accent-mute: #e3edff;
    --error: #c62828;
    --error-bg: #ffebee;
    --tag-bg: #eef;
    --tag-fg: #225;
    --code-bg: #f5f5f5;
    --kw: #aa0044;
    --num: #1565c0;
    --type: #00695c;
    --string: #b35900;
    --comment: #888;
    --edge-fwd: #2962ff;
    --edge-back: #d32f2f;
    --node: #fff;
    --node-stroke: #444;
    --node-entry-bg: #e8f5e9;
    --node-loop-bg: #ffe0b2;
  }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 13px;
    overflow: hidden;
  }
  body { display: flex; flex-direction: column; }
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    margin: 0;
    font-size: 15px;
    font-weight: 600;
    color: var(--fg);
  }
  header .subtitle {
    color: var(--fg-mute);
    font-size: 12px;
  }
  header label { color: var(--fg-mute); margin-right: 4px; }
  select, button {
    font: inherit;
    padding: 4px 8px;
    border: 1px solid var(--border-strong);
    background: var(--panel);
    border-radius: 3px;
    cursor: pointer;
  }
  button:hover, select:hover { background: var(--accent-mute); }

  main {
    flex: 1 1 auto;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }
  .divider {
    flex: 0 0 5px;
    background: var(--border);
    cursor: col-resize;
    transition: background 0.12s;
  }
  .divider:hover, .divider.dragging { background: var(--accent); }
  .pane {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
    min-width: 0;
  }
  .pane.grow { flex: 1 1 auto; }
  .pane.empty .pane-panels { display: flex; align-items: center; justify-content: center; }
  .empty-pane-hint {
    color: var(--fg-mute);
    font-size: 13px;
    padding: 30px;
    text-align: center;
    border: 2px dashed var(--border);
    border-radius: 6px;
    margin: 30px;
    transition: border-color 0.12s, background 0.12s, color 0.12s;
  }
  .pane-panels.drop-active .empty-pane-hint {
    border-color: var(--accent);
    background: var(--accent-mute);
    color: var(--accent);
  }
  .pane-tabs.drop-active {
    background: var(--accent-mute);
  }
  /* Combined editable+highlighted source: a transparent textarea floats
     above a syntax-highlighted <pre>. Both elements have identical font
     metrics so the painted glyphs line up perfectly under the textarea's
     invisible caret-only text. */
  .source-edit-wrap {
    position: relative;
    flex: 1 1 auto;
    width: 100%;
    min-height: 0;
    background: var(--panel);
    overflow: hidden;
  }
  #source-pre, #source {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    margin: 0;
    box-sizing: border-box;
    padding: 12px 14px;
    border: none;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.5;
    tab-size: 2;
    white-space: pre;
    overflow: auto;
  }
  #source-pre {
    pointer-events: none;
    color: var(--fg);
    background: transparent;
  }
  #source-pre .src-kw   { color: #d73a49; font-weight: 500; }
  #source-pre .src-num  { color: #005cc5; }
  #source-pre .src-cmt  { color: #6a737d; font-style: italic; }
  #source-pre .src-type { color: #005a9e; font-weight: 500; }
  #source {
    outline: none;
    resize: none;
    background: transparent;
    color: transparent;
    caret-color: var(--fg);
  }
  /* Read-only source view used inside dynamic tabs (AST source-mode,
     Lifted source-mode). Mirrors editor font/padding so the rendering
     is consistent regardless of which tab you're looking at. */
  pre.source-view {
    margin: 0;
    padding: 12px 14px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.5;
    background: var(--panel);
    color: var(--fg);
    tab-size: 2;
    white-space: pre;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: auto;
  }
  pre.source-view .src-kw   { color: #d73a49; font-weight: 500; }
  pre.source-view .src-num  { color: #005cc5; }
  pre.source-view .src-cmt  { color: #6a737d; font-style: italic; }
  pre.source-view .src-type { color: #005a9e; font-weight: 500; }
  #errors {
    flex: 0 0 auto;
    max-height: 30%;
    overflow: auto;
    padding: 0;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  #errors.hidden { display: none; }
  #errors .err {
    padding: 8px 14px;
    background: var(--error-bg);
    color: var(--error);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    white-space: pre-wrap;
  }
  /* Source panel: textarea fills the panel's full height. */
  .panel[data-tab="source"] { padding: 0; }
  .panel[data-tab="source"].active {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .pane-tabs {
    flex: 0 0 auto;
    display: flex;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0 10px;
    gap: 2px;
    overflow-x: auto;
  }
  .pane-tabs button {
    border: none;
    background: transparent;
    padding: 8px 12px;
    color: var(--fg-mute);
    border-bottom: 2px solid transparent;
    border-radius: 0;
    font-weight: 500;
    white-space: nowrap;
    user-select: none;
  }
  .pane-tabs button:hover { background: var(--accent-mute); color: var(--fg); }
  .pane-tabs button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .pane-tabs button.dragging { opacity: 0.4; }
  .pane-panels {
    flex: 1 1 auto;
    overflow: auto;
    min-height: 0;
  }
  .panel { display: none; padding: 14px 18px; box-sizing: border-box; }
  .panel.active { display: block; }

  /* shared chrome */
  h2.section-title {
    font-size: 13px;
    font-weight: 600;
    margin: 16px 0 6px 0;
    color: var(--fg);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  h2.section-title:first-child { margin-top: 0; }
  .hint {
    font-size: 13px;
    color: var(--fg);
    margin: 0 0 14px 0;
    line-height: 1.6;
    max-width: 78ch;
  }
  .hint.muted { color: var(--fg-mute); font-size: 12.5px; }
  .callout {
    border-left: 3px solid var(--accent);
    background: var(--accent-mute);
    padding: 10px 14px;
    margin: 12px 0;
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--fg);
    max-width: 78ch;
    border-radius: 0 4px 4px 0;
  }
  .callout strong { color: var(--accent); }
  .catalog {
    border-collapse: collapse;
    margin: 8px 0 14px 0;
    font-size: 12.5px;
    width: 100%;
    max-width: 880px;
  }
  .catalog th, .catalog td {
    padding: 5px 12px 5px 0;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    text-align: left;
  }
  .catalog th {
    color: var(--fg-mute);
    font-weight: 500;
    text-transform: uppercase;
    font-size: 10.5px;
    letter-spacing: 0.4px;
    padding-top: 8px;
    padding-bottom: 4px;
  }
  .catalog td.cat {
    color: var(--fg-mute);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    width: 110px;
    white-space: nowrap;
  }
  .catalog td.cname {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    color: var(--type);
    font-weight: 600;
    width: 130px;
    white-space: nowrap;
  }
  .catalog tr.cat-divider td.cat {
    border-top: 1px solid var(--border);
  }
  pre.code, .mono {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px;
    line-height: 1.55;
    margin: 0;
  }
  pre.code {
    background: var(--code-bg);
    padding: 10px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    overflow: auto;
  }
  table.kv {
    border-collapse: collapse;
    margin: 4px 0 12px 0;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px;
  }
  table.kv td, table.kv th {
    padding: 3px 10px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    vertical-align: top;
  }
  table.kv th {
    color: var(--fg-mute);
    font-weight: 500;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.4px;
  }
  .tag {
    display: inline-block;
    padding: 1px 6px;
    background: var(--tag-bg);
    color: var(--tag-fg);
    border-radius: 3px;
    font-size: 11px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  .kw     { color: var(--kw);   }
  .num    { color: var(--num);  }
  .type   { color: var(--type); font-weight: 500; }
  .str    { color: var(--string); }
  .cmt    { color: var(--comment); }
  .mute   { color: var(--fg-mute); }

  /* AST tree */
  .ast-tree { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 12.5px; }
  .ast-node { padding-left: 16px; position: relative; }
  .ast-node::before {
    content: "";
    position: absolute;
    left: 4px; top: 0; bottom: 0;
    border-left: 1px dotted #bbb;
  }
  .ast-label { display: inline; }
  .ast-children { padding-left: 12px; }

  /* CFG text view */
  .cfg-block {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    margin: 0 0 10px 0;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px;
  }
  .cfg-block .header {
    font-weight: 600;
    color: var(--type);
    margin-bottom: 4px;
  }
  .cfg-block .inst {
    padding-left: 14px;
    color: var(--fg);
  }
  .cfg-block .term {
    padding-left: 14px;
    color: var(--kw);
    margin-top: 4px;
  }
  .cfg-block.entry { border-left: 3px solid #43a047; }
  .cfg-block.loop-header { border-left: 3px solid #fb8c00; }

  /* CFG graph view: HTML DIV blocks placed by BFS-level, with an SVG
     overlay for bezier edges. (Inspired by the c-compiler/disasm tool's
     layout — works much better than a single-column SVG for branching
     control flow.) */
  .cfg-canvas {
    width: 100%;
    overflow: auto;
    background: #fafbfc;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .cfg-stage {
    position: relative;
    /* width/height set by JS after layout. */
  }
  .cfg-edges {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    overflow: visible;
  }
  .cfg-edges path {
    fill: none;
    stroke: #6b7280;
    stroke-width: 1.6px;
  }
  .cfg-edges path.cfg-edge-true   { stroke: #16a34a; }
  .cfg-edges path.cfg-edge-false  { stroke: #dc2626; }
  .cfg-edges path.cfg-edge-back   { stroke: #9333ea; stroke-dasharray: 4 3; }
  .cfg-edges text.cfg-edge-label {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 11px;
    fill: #6b7280;
    font-weight: 600;
    paint-order: stroke;
    stroke: white;
    stroke-width: 3px;
  }
  .cfg-node {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: 5px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 11.5px;
    overflow: hidden;
  }
  .cfg-node.entry { border-color: #43a047; }
  .cfg-node.entry .cfg-node-header { background: #e8f5e9; }
  .cfg-node.loop-header { border-color: #fb8c00; }
  .cfg-node.loop-header .cfg-node-header { background: #ffe0b2; }
  .cfg-node-header {
    padding: 4px 10px;
    font-weight: 600;
    color: var(--type);
    background: #f3f4f6;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .cfg-node-header .cfg-node-params {
    color: var(--fg-mute);
    font-weight: normal;
    font-size: 10.5px;
  }
  .cfg-node-body {
    padding: 4px 10px;
    line-height: 1.55;
    color: var(--fg);
  }
  .cfg-node-stmt {
    white-space: pre;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cfg-node-stmt.empty {
    color: var(--fg-mute);
    font-style: italic;
  }
  .cfg-node-term {
    padding: 4px 10px;
    border-top: 1px solid var(--border);
    color: var(--fg);
    background: #fafafa;
  }
  .cfg-node-term .cfg-term-kind { color: var(--kw); font-weight: 600; }
  .cfg-node-term .cfg-term-expr { color: var(--fg); }
  .cfg-node-term.term-return     { background: rgba(67, 160, 71, 0.08); }
  .cfg-node-term.term-unreachable { background: rgba(229, 57, 53, 0.10); }

  /* Per-function group */
  .fn-group {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 12px 16px;
    margin: 0 0 18px 0;
  }
  .fn-group h3 {
    margin: 0 0 10px 0;
    font-size: 13px;
    color: var(--accent);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  .fn-group .sub {
    color: var(--fg-mute);
    font-weight: normal;
    font-size: 12px;
  }

  .toggle-group {
    display: inline-flex;
    margin-bottom: 10px;
    border: 1px solid var(--border-strong);
    border-radius: 3px;
    overflow: hidden;
  }
  .toggle-group button {
    border: none;
    border-right: 1px solid var(--border-strong);
    border-radius: 0;
    padding: 4px 12px;
  }
  .toggle-group button:last-child { border-right: none; }
  .toggle-group button.active {
    background: var(--accent);
    color: white;
  }

  /* Pipeline tab */
  .pipeline-flow {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    align-items: center;
    margin: 0 0 18px 0;
    padding: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 5px;
  }
  .pipeline-flow .phase-box {
    background: var(--accent-mute);
    border: 1px solid #b0c4e8;
    color: var(--accent);
    border-radius: 4px;
    padding: 6px 10px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 11.5px;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: background 0.12s, border-color 0.12s;
  }
  .pipeline-flow .phase-box:hover { background: #d3e3ff; }
  .pipeline-flow .phase-arrow {
    color: var(--fg-mute);
    padding: 0 6px;
    font-family: ui-monospace, monospace;
    font-size: 13px;
  }
  .phase-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 14px 18px;
    margin: 0 0 16px 0;
  }
  .phase-card h3 {
    margin: 0 0 4px 0;
    font-size: 14px;
    color: var(--accent);
  }
  .phase-card .phase-sub {
    color: var(--fg-mute);
    font-size: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    margin-bottom: 8px;
  }
  .phase-card .phase-summary {
    color: var(--fg);
    font-size: 12.5px;
    line-height: 1.55;
    margin: 8px 0;
  }
  .phase-io {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    margin: 8px 0;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 11.5px;
    flex-wrap: wrap;
  }
  .phase-io .io-label {
    color: var(--fg-mute);
    text-transform: uppercase;
    font-size: 10.5px;
    letter-spacing: 0.4px;
    flex: 0 0 auto;
  }
  .phase-io .io-shape {
    color: var(--type);
  }
  .phase-io .io-arrow { color: var(--fg-mute); }
  .phase-source {
    margin: 8px 0 14px 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--panel);
  }
  .phase-source > summary {
    cursor: pointer;
    padding: 8px 12px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 11.5px;
    color: var(--fg-mute);
    background: var(--panel);
    border-radius: 4px;
    user-select: none;
    list-style: none;
  }
  .phase-source > summary::before {
    content: "▸";
    display: inline-block;
    width: 12px;
    color: var(--fg-mute);
    transition: transform 0.12s;
  }
  .phase-source[open] > summary::before { transform: rotate(90deg); }
  .phase-source > summary:hover { background: var(--accent-mute); color: var(--accent); }
  .phase-source[open] > summary {
    border-bottom: 1px solid var(--border);
    border-radius: 4px 4px 0 0;
  }
  .phase-source-key {
    padding: 6px 14px 0 14px;
    color: var(--fg-mute);
    font-size: 11px;
  }
  .phase-source > pre.phase-code { margin: 0; border-radius: 0 0 4px 4px; }
  .phase-source > pre.phase-code:not(:last-child) { border-radius: 0; }
  .pipeline-flow .phase-box .openbtn,
  .phase-card .openbtn {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 6px;
    background: var(--panel);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 3px;
    font-size: 10.5px;
    cursor: pointer;
    user-select: none;
    transition: background 0.12s;
  }
  .pipeline-flow .phase-box .openbtn:hover,
  .phase-card .openbtn:hover {
    background: var(--accent);
    color: white;
  }
  .phase-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .phase-card-head .openbtn {
    flex: 0 0 auto;
    margin-left: 0;
    font-size: 11.5px;
    padding: 3px 10px;
  }

  .phase-code {
    margin: 8px 0 0 0;
    background: #1e1e1e;
    color: #d4d4d4;
    padding: 12px 14px;
    border-radius: 4px;
    overflow: auto;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 11.5px;
    line-height: 1.5;
    max-height: 360px;
  }
  .phase-code .src-kw   { color: #569cd6; }
  .phase-code .src-str  { color: #ce9178; }
  .phase-code .src-num  { color: #b5cea8; }
  .phase-code .src-cmt  { color: #6a9955; font-style: italic; }
  /* Light-bg palette used by inline `<pre class="code">` blocks in
     the tab content (e.g. anatomy snippets, output-shape diagrams). */
  pre.code .src-kw   { color: #d73a49; font-weight: 500; }
  pre.code .src-str  { color: #032f62; }
  pre.code .src-num  { color: #005cc5; }
  pre.code .src-cmt  { color: #6a737d; font-style: italic; }
  pre.code .src-id   { color: var(--fg); }
  pre.code .src-type { color: #005a9e; font-weight: 500; }

  .phase-code .src-fn   { color: #dcdcaa; }
  .phase-code .src-type { color: #4ec9b0; }

  /* Tab reorder: a vertical bar shown next to the button the dragged
     tab would be inserted before (or after the last button). */
  .pane-tabs button.drop-before { box-shadow: inset 2px 0 0 var(--accent); }
  .pane-tabs button.drop-after  { box-shadow: inset -2px 0 0 var(--accent); }

  /* Bottom padding for explainer tabs: lets the user scroll the
     final section into roughly the middle of the viewport instead
     of being stuck at the bottom. Excluded for the Source tab,
     whose flex-column layout fills 100% height by design. */
  .panel.active:not([data-tab="source"]) { padding-bottom: 40vh; }

  /* Disasm view */
  .disasm-line { display: flex; gap: 12px; padding: 1px 0; }
  .disasm-offset {
    flex: 0 0 5em;
    color: var(--fg-mute);
    text-align: right;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
  }
  .disasm-bytes {
    flex: 0 0 12em;
    color: var(--num);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
  }
  .disasm-asm {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px;
  }
  .disasm-block-marker {
    color: var(--accent);
    font-weight: 600;
    margin-top: 6px;
  }
</style>
</head>
<body>

<header>
  <h1>c0</h1>
  <span class="subtitle">statement-CFG → wasm, one phase at a time</span>
  <span style="flex: 1;"></span>
  <label for="backend-select">Backend:</label>
  <select id="backend-select">
    <option value="c0">c0 (statement-CFG)</option>
    <!-- c1.js / c2.js are slotted in by build.py when ready. Options
         appear automatically per window.BACKENDS_AVAILABLE. -->
  </select>
  <label for="example-select" style="margin-left: 8px;">Example:</label>
  <select id="example-select"></select>
</header>

<main>
  <div class="pane" id="paneA" style="flex-basis: 540px;">
    <div class="pane-tabs"></div>
    <div class="pane-panels"></div>
  </div>
  <div class="divider" data-resize="paneA"></div>
  <div class="pane grow" id="paneB">
    <div class="pane-tabs"></div>
    <div class="pane-panels"></div>
  </div>

  <!-- Source textarea + errors div live here permanently in the DOM
       (avoiding remount overhead) but are moved into the active pane's
       source-tab panel at boot. Their IDs stay stable for tests. -->
  <template id="source-boot">
    <div class="source-edit-wrap">
      <pre id="source-pre" aria-hidden="true"></pre>
      <textarea id="source" spellcheck="false" autocomplete="off"
                autocorrect="off" autocapitalize="off" wrap="off"></textarea>
    </div>
    <div id="errors" class="hidden"></div>
  </template>
</main>

<script>
window.C0 = (function() {
  var module = { exports: {} };
  var require = { main: null };
  var process = { exit: function() {} };
"use strict";

const AST = (() => {

  class Program {
    constructor(loc, functions) {
      this.loc = loc;
      this.functions = functions;
    }
  }

  class Function {
    constructor(loc, returnType, name, parameters, body) {
      this.loc = loc;
      this.returnType = returnType;
      this.name = name;
      this.parameters = parameters; // Variable[]
      this.body = body; // single Block
    }
  }

  class Block {
    constructor(loc, statements) {
      this.loc = loc;
      this.statements = statements;
    }
  }

  class Literal {
    constructor(loc, type, value) {
      this.loc = loc;
      this.type = type;   // 'i32', 'i64', 'f32', 'f64'
      this.value = value; // number (for i32/f32/f64) or BigInt (for i64)
    }
  }

  class Variable {
    constructor(loc, type, name) {
      this.loc = loc;
      this.type = type; // 'i32', 'i64', 'f32', 'f64'
      this.name = name;
    }
  }

  class Declare {
    constructor(loc, variable, initializer) {
      this.loc = loc;
      this.variable = variable; // Variable
      this.initializer = initializer; // Expression or null
    }
  }

  class Assign {
    constructor(loc, variable, value) {
      this.loc = loc;
      this.variable = variable; // Variable
      this.value = value; // Expression
    }
  }

  // Supported binops:
  //   +, -, *, /, % (integer and float)
  //   ==, !=, <, <=, >, >= (integer and float comparisons)
  class Binary {
    constructor(loc, op, left, right) {
      this.loc = loc;
      this.op = op; // e.g. '+', '-', '*', '/', '==', '<', etc.
      this.left = left;   // Expression
      this.right = right; // Expression
    }
  }

  class Unary {
    constructor(loc, op, operand) {
      this.loc = loc;
      this.op = op; // e.g. '-', '!'
      this.operand = operand; // Expression
    }
  }

  // Block-bodied switch — cases are inline marker statements within the body
  // (like Label), not separate Blocks. This makes fallthrough natural and lets
  // case labels appear inside nested control flow (e.g. Duff's device).
  class Switch {
    constructor(loc, value, body) {
      this.loc = loc;
      this.value = value; // Expression
      this.body = body;   // Block (may contain Case markers anywhere)
    }
  }

  // Inline marker: `case N:` or `default:`. value === null means default.
  // Lowered like a Label — each Case marker becomes a BasicBlock target,
  // and the enclosing Switch emits a dispatch table to those blocks.
  class Case {
    constructor(loc, value) {
      this.loc = loc;
      this.value = value; // number | null  (null = default)
    }
  }

  class If {
    constructor(loc, cond, thenBlock, elseBlock) {
      this.loc = loc;
      this.cond = cond; // Expression
      this.thenBlock = thenBlock; // Block
      this.elseBlock = elseBlock; // Block or null
    }
  }

  class While {
    constructor(loc, cond, body) {
      this.loc = loc;
      this.cond = cond; // Expression
      this.body = body; // Block
    }
  }

  class DoWhile {
    constructor(loc, body, cond) {
      this.loc = loc;
      this.body = body; // Block
      this.cond = cond; // Expression
    }
  }

  class Break {
    constructor(loc) {
      this.loc = loc;
    }
  }

  // Just a marker: `name:` in source. Goto targets resolve by walking the
  // enclosing block. A later lifting pass turns flat labels + gotos into
  // structured control flow before CODEGEN.emit.
  class Label {
    constructor(loc, name) {
      this.loc = loc;
      this.name = name; // string (label name)
    }
  }

  class Goto {
    constructor(loc, target) {
      this.loc = loc;
      this.target = target; // string (label name)
    }
  }

  class Return {
    constructor(loc, value) {
      this.loc = loc;
      this.value = value; // Expression (no void in this language)
    }
  }

  const TYPE = (() => {
    const CMP = new Set(['==', '!=', '<', '<=', '>', '>=']);

    const of = (e) => {
      if (e instanceof AST.Literal) return e.type;
      if (e instanceof AST.Variable) return e.type;
      if (e instanceof AST.Binary) return CMP.has(e.op) ? 'i32' : of(e.left);
      if (e instanceof AST.Unary) return e.op === '!' ? 'i32' : of(e.operand);
      throw new Error('AST.TYPE.of: ' + e.constructor.name);
    };

    return { of };
  })();

  // ─────────────────────── AST pretty-printer ─────────────────────────
  //
  // Renders an AST.Program back to c0 source text. Used by the Lifted tab
  // to display CFG.intoAST's output as readable source (which the user can
  // paste back into the editor for re-compilation).
  function printSource(program) {
    const PREC = {
      '||': 1, '&&': 2,
      '==': 3, '!=': 3, '<': 4, '<=': 4, '>': 4, '>=': 4,
      '+': 5, '-': 5, '*': 6, '/': 6, '%': 6,
    };

    const printExpr = (e, parentPrec = 0) => {
      if (e instanceof AST.Literal) {
        if (e.type === 'i64') return e.value.toString() + 'L';
        if (e.type === 'f32') return Number(e.value).toString() + 'f';
        if (e.type === 'f64') {
          const s = Number(e.value).toString();
          return s.includes('.') || s.includes('e') ? s : s + '.0';
        }
        return e.value.toString();
      }
      if (e instanceof AST.Variable) return e.name;
      if (e instanceof AST.Unary) {
        const inner = printExpr(e.operand, 7);
        return `${e.op}${inner}`;
      }
      if (e instanceof AST.Binary) {
        const p = PREC[e.op] ?? 0;
        const s = `${printExpr(e.left, p)} ${e.op} ${printExpr(e.right, p + 1)}`;
        return p < parentPrec ? `(${s})` : s;
      }
      throw new Error('printExpr: ' + e?.constructor?.name);
    };

    const lines = [];
    const printStmt = (st, ind) => {
      const pad = '  '.repeat(ind);
      if (st instanceof AST.Block) {
        st.statements.forEach((s) => printStmt(s, ind));
      } else if (st instanceof AST.Declare) {
        lines.push(`${pad}${st.variable.type} ${st.variable.name}${st.initializer ? ' = ' + printExpr(st.initializer) : ''};`);
      } else if (st instanceof AST.Assign) {
        lines.push(`${pad}${st.variable.name} = ${printExpr(st.value)};`);
      } else if (st instanceof AST.If) {
        lines.push(`${pad}if (${printExpr(st.cond)}) {`);
        printStmt(st.thenBlock, ind + 1);
        if (st.elseBlock) {
          lines.push(`${pad}} else {`);
          printStmt(st.elseBlock, ind + 1);
        }
        lines.push(`${pad}}`);
      } else if (st instanceof AST.While) {
        lines.push(`${pad}while (${printExpr(st.cond)}) {`);
        printStmt(st.body, ind + 1);
        lines.push(`${pad}}`);
      } else if (st instanceof AST.DoWhile) {
        lines.push(`${pad}do {`);
        printStmt(st.body, ind + 1);
        lines.push(`${pad}} while (${printExpr(st.cond)});`);
      } else if (st instanceof AST.Switch) {
        lines.push(`${pad}switch (${printExpr(st.value)}) {`);
        printStmt(st.body, ind + 1);
        lines.push(`${pad}}`);
      } else if (st instanceof AST.Case) {
        const tag = st.value === null ? 'default' : `case ${st.value}`;
        lines.push(`${pad}${tag}:`);
      } else if (st instanceof AST.Break) {
        lines.push(`${pad}break;`);
      } else if (st instanceof AST.Return) {
        lines.push(`${pad}return ${printExpr(st.value)};`);
      } else if (st instanceof AST.Label) {
        lines.push(`${pad}${st.name}:`);
      } else if (st instanceof AST.Goto) {
        lines.push(`${pad}goto ${st.target};`);
      } else {
        throw new Error('printStmt: ' + st?.constructor?.name);
      }
    };

    const fnLines = program.functions.map((fn) => {
      lines.length = 0;
      const params = fn.parameters.map((p) => `${p.type} ${p.name}`).join(', ');
      lines.push(`${fn.returnType} ${fn.name}(${params}) {`);
      printStmt(fn.body, 1);
      lines.push('}');
      return lines.join('\n');
    });
    return fnLines.join('\n\n') + '\n';
  }

  return {
    Program, Function, Block,
    Literal, Variable,
    Declare, Assign,
    Binary, Unary,
    Switch, Case, If, While, DoWhile, Break,
    Label, Goto, Return,
    TYPE, printSource,
  };
})();

const PARSER = (() => {

  function tokenize(source) {
    const KEYWORDS = new Set([
      'i32', 'i64', 'f32', 'f64',
      'while', 'do', 'break', 'switch', 'case', 'default',
      'if', 'else', 'goto', 'return',
    ]);
    // Source-level type aliases: `int x;` lexes identically to `i32 x;`.
    // The alias is folded away at tokenize time, so the AST/CFG/codegen
    // only ever see the canonical wasm names.
    const TYPE_ALIAS = { int: 'i32', long: 'i64', float: 'f32', double: 'f64' };
    const PUNCT2 = ['==', '!=', '<=', '>='];
    const PUNCT1 = '{}()[];,:+-*/%!=<>';
    const s = source;
    const tokens = [];
    let i = 0, line = 1, col = 1;
    // Consumes [i..) while pattern matches; returns the consumed substring.
    const munch = (pattern) => {
      const start = i;
      while (i < s.length && pattern.test(s[i])) { i++; col++; }
      return s.slice(start, i);
    };
    while (i < s.length) {
      const c = s[i];
      if (c === '\n') { i++; line++; col = 1; continue; }
      if (/\s/.test(c)) { i++; col++; continue; }
      if (c === '/' && s[i + 1] === '/') {
        while (i < s.length && s[i] !== '\n') { i++; col++; }
        continue;
      }
      const startLine = line, startCol = col;
      if (/[a-zA-Z_]/.test(c)) {
        const text = munch(/[a-zA-Z0-9_]/);
        const name = TYPE_ALIAS[text] ?? text;
        const type = KEYWORDS.has(name) ? name : 'ID';
        tokens.push({ type, value: name, line: startLine, col: startCol });
        continue;
      }
      if (/[0-9]/.test(c)) {
        let text = munch(/[0-9]/);
        let type = 'NUM';
        if (s[i] === '.') {
          text += s[i]; i++; col++;
          text += munch(/[0-9]/);
          type = 'FLOAT';
        }
        const value = type === 'FLOAT' ? parseFloat(text) : BigInt(text);
        tokens.push({ type, value, line: startLine, col: startCol });
        continue;
      }
      const two = s.slice(i, i + 2);
      if (PUNCT2.includes(two)) {
        tokens.push({ type: two, value: two, line: startLine, col: startCol });
        i += 2; col += 2;
        continue;
      }
      if (PUNCT1.includes(c)) {
        tokens.push({ type: c, value: c, line: startLine, col: startCol });
        i++; col++;
        continue;
      }
      throw new Error(`Unexpected '${c}' at line ${line}:${col}`);
    }
    return tokens;
  }
  // Parses source (string) to AST.Program.
  function parse(source) {
    // === setup ===
    const tokens = tokenize(source);
    let i = 0;
    let scope = Object.create(null);     // name → AST.Variable; flat per-function

    // === parse helpers ===
    const peek = (k = 0) => tokens[i + k];
    const advance = () => tokens[i++];
    const loc = (t) => t ? { line: t.line, col: t.col } : { line: 0, col: 0 };
    function at(type, value = null) {
      const t = peek();
      return !!t && t.type === type && (value === null || t.value === value);
    }
    function eat(type, value = null) {
      if (at(type, value)) return advance();
      return null;
    }
    function expect(type, value = null) {
      const t = eat(type, value);
      if (!t) throw new Error(`Expected ${value ?? type} at line ${peek()?.line}:${peek()?.col}`);
      return t;
    }

    // === grammar ===
    function atType() { return at('i32') || at('i64') || at('f32') || at('f64'); }
    function parseType() {
      const t = eat('i32') || eat('i64') || eat('f32') || eat('f64');
      if (!t) throw new Error(`Expected type at line ${peek()?.line}:${peek()?.col}`);
      return t.value;
    }

    function parseBlock() {
      const open = expect('{');
      const stmts = [];
      while (!eat('}')) stmts.push(parseStatement());
      return new AST.Block(loc(open), stmts);
    }

    function parseStatement() {
      // Label: ID :   (marker only — no body, no trailing `;`)
      if (peek()?.type === 'ID' && peek(1)?.type === ':') {
        const nameTok = advance(); advance();
        return new AST.Label(loc(nameTok), nameTok.value);
      }
      // Case marker: `case NUM :` or `default :` (inline markers, only
      // meaningful inside a Switch body; the CFG lowering treats them like
      // labels and the enclosing Switch wires them into its dispatch table).
      if (at('case')) {
        const ct = advance();
        const numTok = expect('NUM');
        expect(':');
        return new AST.Case(loc(ct), Number(numTok.value));
      }
      if (at('default')) {
        const dt = advance();
        expect(':');
        return new AST.Case(loc(dt), null);
      }
      // Declare: <type> ID [= expr] ;
      if (atType()) {
        const start = peek();
        const type = parseType();
        const id = expect('ID');
        if (scope[id.value]) throw new Error(`Duplicate var ${id.value} at line ${id.line}:${id.col}`);
        const variable = new AST.Variable(loc(id), type, id.value);
        scope[id.value] = variable;
        const init = eat('=') ? parseExpression() : null;
        expect(';');
        return new AST.Declare(loc(start), variable, init);
      }
      if (at('if')) return parseIf();
      if (at('while')) return parseWhile();
      if (at('do')) return parseDoWhile();
      if (at('switch')) return parseSwitch();
      if (at('{')) return parseBlock();
      if (at('break')) {
        const t = advance(); expect(';');
        return new AST.Break(loc(t));
      }
      if (at('return')) {
        const t = advance();
        const e = parseExpression();
        expect(';');
        return new AST.Return(loc(t), e);
      }
      if (at('goto')) {
        const t = advance();
        const tgt = expect('ID');
        expect(';');
        return new AST.Goto(loc(t), tgt.value);
      }
      // Assign: ID = expr ;
      if (peek()?.type === 'ID' && peek(1)?.type === '=') {
        const id = advance(); advance();
        const value = parseExpression();
        expect(';');
        const v = scope[id.value];
        if (!v) throw new Error(`Undefined variable ${id.value} at line ${id.line}:${id.col}`);
        return new AST.Assign(loc(id), v, value);
      }
      const bad = peek();
      throw new Error(`Unexpected token ${bad?.type} at line ${bad?.line}:${bad?.col}`);
    }

    function parseIf() {
      const t = expect('if');
      expect('(');
      const cond = parseExpression();
      expect(')');
      const thenBlock = parseBlock();
      // `else if` parses as a nested If wrapped in a 1-statement Block so
      // AST.If's elseBlock invariant (Block | null) holds.
      let elseBlock = null;
      if (eat('else')) {
        if (at('if')) {
          const nested = parseIf();
          elseBlock = new AST.Block(nested.loc, [nested]);
        } else {
          elseBlock = parseBlock();
        }
      }
      return new AST.If(loc(t), cond, thenBlock, elseBlock);
    }

    function parseWhile() {
      const t = expect('while');
      expect('(');
      const cond = parseExpression();
      expect(')');
      const body = parseBlock();
      return new AST.While(loc(t), cond, body);
    }

    function parseDoWhile() {
      const t = expect('do');
      const body = parseBlock();
      expect('while');
      expect('(');
      const cond = parseExpression();
      expect(')');
      expect(';');
      return new AST.DoWhile(loc(t), body, cond);
    }

    function parseSwitch() {
      const t = expect('switch');
      expect('(');
      const value = parseExpression();
      expect(')');
      // Body is a regular Block; case/default markers parse as statements
      // (handled in parseStatement). Fallthrough between cases is natural —
      // explicit `break;` exits the switch.
      const body = parseBlock();
      return new AST.Switch(loc(t), value, body);
    }

    function parseExpression() {
      return parseComparison();
    }
    function parseComparison() {
      let left = parseAdd();
      while (at('==') || at('!=') || at('<') || at('<=') || at('>') || at('>=')) {
        const op = advance().value;
        const right = parseAdd();
        left = new AST.Binary(left.loc, op, left, right);
      }
      return left;
    }
    function parseAdd() {
      let left = parseMul();
      while (at('+') || at('-')) {
        const op = advance().value;
        const right = parseMul();
        left = new AST.Binary(left.loc, op, left, right);
      }
      return left;
    }
    function parseMul() {
      let left = parseUnary();
      while (at('*') || at('/') || at('%')) {
        const op = advance().value;
        const right = parseUnary();
        left = new AST.Binary(left.loc, op, left, right);
      }
      return left;
    }
    function parseUnary() {
      if (at('+') || at('-') || at('!')) {
        const t = advance();
        const expr = parseUnary();
        return new AST.Unary(loc(t), t.value, expr);
      }
      return parsePrimary();
    }
    function parsePrimary() {
      const t = peek();
      if (eat('NUM')) return new AST.Literal(loc(t), 'i32', t.value);
      if (eat('FLOAT')) return new AST.Literal(loc(t), 'f64', t.value);
      if (eat('ID')) {
        if (scope[t.value]) return scope[t.value];
        throw new Error(`Undefined variable ${t.value} at line ${t.line}:${t.col}`);
      }
      if (eat('(')) {
        const e = parseExpression();
        expect(')');
        return e;
      }
      throw new Error(`Unexpected token ${t?.type} at line ${t?.line}:${t?.col}`);
    }

    // <type> ID ( [<type> ID, ...] ) <block>
    function parseFunction() {
      const start = peek();
      const retType = parseType();
      const nameTok = expect('ID');
      expect('(');
      const params = [];
      if (!at(')')) {
        do {
          const pType = parseType();
          const pName = expect('ID');
          params.push(new AST.Variable(loc(pName), pType, pName.value));
        } while (eat(','));
      }
      expect(')');
      // Fresh per-function scope, seeded with parameters.
      scope = Object.create(null);
      for (const p of params) scope[p.name] = p;
      const body = parseBlock();
      return new AST.Function(loc(start), retType, nameTok.value, params, body);
    }

    const functions = [];
    while (i < tokens.length) functions.push(parseFunction());
    return new AST.Program(loc(tokens[0]), functions);
  }
  return { parse, tokenize };
})();

const CFG = (() => {

  // ────── Statement-CFG ──────
  //
  // Each BasicBlock holds a straight-line list of AST.Assign statements
  // (mutations to declared locals); branching lives in the terminator.
  // Expressions stay as AST trees — no stack-machine ops, no SSA, no
  // value-naming. Function locals are tracked at the Function level
  // (Declare nodes from the source contribute their AST.Variable here
  // and their initializer becomes an Assign at the point of declaration).

  // ────── Terminators ──────
  //
  // BrIf and Return carry full AST.Expression trees as cond / value.

  class Terminator {
    constructor(loc) { this.loc = loc; }
    get successors() { return []; }
  }

  class Br extends Terminator {
    constructor(loc, target) {
      if (!(target instanceof BasicBlock)) throw new Error('Br: target must be a BasicBlock');
      super(loc);
      this.target = target;
    }
    get successors() { return [this.target]; }
  }

  class BrIf extends Terminator {
    constructor(loc, cond, trueTarget, falseTarget) {
      if (!(trueTarget instanceof BasicBlock) || !(falseTarget instanceof BasicBlock)) {
        throw new Error('BrIf: targets must be BasicBlocks');
      }
      super(loc);
      this.cond = cond;                  // AST.Expression
      this.trueTarget = trueTarget;
      this.falseTarget = falseTarget;
    }
    get successors() { return [this.trueTarget, this.falseTarget]; }
  }

  class Return extends Terminator {
    constructor(loc, value) {
      super(loc);
      this.value = value;                // AST.Expression
    }
  }

  class Unreachable extends Terminator {
    constructor(loc) { super(loc); }
  }

  // ────── BasicBlock / Function / Module ──────

  class BasicBlock {
    constructor(name) {
      this.name = name;
      this.id = -1;
      this.statements = [];              // AST.Assign[] — straight-line only
      this.terminator = null;
    }
    append(stmt) {
      if (this.terminator) throw new Error(`Block '${this.name}' already terminated`);
      this.statements.push(stmt);
      return stmt;
    }
    terminate(t) {
      if (this.terminator) throw new Error(`Block '${this.name}' already terminated`);
      this.terminator = t;
    }
  }

  class Function {
    constructor(name, params, returnType, exportName = null) {
      this.name = name;
      this.params = params;              // AST.Variable[] — function parameters
      this.returnType = returnType;
      this.exportName = exportName;
      this.locals = [];                  // AST.Variable[] — declared non-param locals, in order
      this.entry = new BasicBlock('entry');
      this.entry.id = 0;
      this.blocks = [this.entry];
    }
    addLocal(v) { this.locals.push(v); return v; }
    createBlock(name) {
      const b = new BasicBlock(name);
      b.id = this.blocks.length;
      this.blocks.push(b);
      return b;
    }
  }

  class Module {
    constructor(functions) { this.functions = functions; }
  }

  function fromAST(program) {
    // Lower AST.Program => CFG.Module.
    //
    // Walks each function with a "current block" cursor. Straight-line code
    // (Assign + Declare-with-initializer) pushes AST.Assign nodes into
    // block.statements as-is; control flow constructs (If/While/Switch/
    // Break/Return/Goto) open fresh blocks and connect them with

  "parse": "// Parses source (string) to AST.Program.\nfunction parse(source) {\n  // === setup ===\n  const tokens = tokenize(source);\n  let i = 0;\n  let scope = Object.create(null);     // name → AST.Variable; flat per-function\n\n  // === parse helpers ===\n  const peek = (k = 0) => tokens[i + k];\n  const advance = () => tokens[i++];\n  const loc = (t) => t ? { line: t.line, col: t.col } : { line: 0, col: 0 };\n  function at(type, value = null) {\n    const t = peek();\n    return !!t && t.type === type && (value === null || t.value === value);\n  }\n  function eat(type, value = null) {\n    if (at(type, value)) return advance();\n    return null;\n  }\n  function expect(type, value = null) {\n    const t = eat(type, value);\n    if (!t) throw new Error(`Expected ${value ?? type} at line ${peek()?.line}:${peek()?.col}`);\n    return t;\n  }\n\n  // === grammar ===\n  function atType() { return at('i32') || at('i64') || at('f32') || at('f64'); }\n  function parseType() {\n    const t = eat('i32') || eat('i64') || eat('f32') || eat('f64');\n    if (!t) throw new Error(`Expected type at line ${peek()?.line}:${peek()?.col}`);\n    return t.value;\n  }\n\n  function parseBlock() {\n    const open = expect('{');\n    const stmts = [];\n    while (!eat('}')) stmts.push(parseStatement());\n    return new AST.Block(loc(open), stmts);\n  }\n\n  function parseStatement() {\n    // Label: ID :   (marker only — no body, no trailing `;`)\n    if (peek()?.type === 'ID' && peek(1)?.type === ':') {\n      const nameTok = advance(); advance();\n      return new AST.Label(loc(nameTok), nameTok.value);\n    }\n    // Case marker: `case NUM :` or `default :` (inline markers, only\n    // meaningful inside a Switch body; the CFG lowering treats them like\n    // labels and the enclosing Switch wires them into its dispatch table).\n    if (at('case')) {\n      const ct = advance();\n      const numTok = expect('NUM');\n      expect(':');\n      return new AST.Case(loc(ct), Number(numTok.value));\n    }\n    if (at('default')) {\n      const dt = advance();\n      expect(':');\n      return new AST.Case(loc(dt), null);\n    }\n    // Declare: <type> ID [= expr] ;\n    if (atType()) {\n      const start = peek();\n      const type = parseType();\n      const id = expect('ID');\n      if (scope[id.value]) throw new Error(`Duplicate var ${id.value} at line ${id.line}:${id.col}`);\n      const variable = new AST.Variable(loc(id), type, id.value);\n      scope[id.value] = variable;\n      const init = eat('=') ? parseExpression() : null;\n      expect(';');\n      return new AST.Declare(loc(start), variable, init);\n    }\n    if (at('if')) return parseIf();\n    if (at('while')) return parseWhile();\n    if (at('do')) return parseDoWhile();\n    if (at('switch')) return parseSwitch();\n    if (at('{')) return parseBlock();\n    if (at('break')) {\n      const t = advance(); expect(';');\n      return new AST.Break(loc(t));\n    }\n    if (at('return')) {\n      const t = advance();\n      const e = parseExpression();\n      expect(';');\n      return new AST.Return(loc(t), e);\n    }\n    if (at('goto')) {\n      const t = advance();\n      const tgt = expect('ID');\n      expect(';');\n      return new AST.Goto(loc(t), tgt.value);\n    }\n    // Assign: ID = expr ;\n    if (peek()?.type === 'ID' && peek(1)?.type === '=') {\n      const id = advance(); advance();\n      const value = parseExpression();\n      expect(';');\n      const v = scope[id.value];\n      if (!v) throw new Error(`Undefined variable ${id.value} at line ${id.line}:${id.col}`);\n      return new AST.Assign(loc(id), v, value);\n    }\n    const bad = peek();\n    throw new Error(`Unexpected token ${bad?.type} at line ${bad?.line}:${bad?.col}`);\n  }\n\n  function parseIf() {\n    const t = expect('if');\n    expect('(');\n    const cond = parseExpression();\n    expect(')');\n    const thenBlock = parseBlock();\n    // `else if` parses as a nested If wrapped in a 1-statement Block so\n    // AST.If's elseBlock invariant (Block | null) holds.\n    let elseBlock = null;\n    if (eat('else')) {\n      if (at('if')) {\n        const nested = parseIf();\n        elseBlock = new AST.Block(nested.loc, [nested]);\n      } else {\n        elseBlock = parseBlock();\n      }\n    }\n    return new AST.If(loc(t), cond, thenBlock, elseBlock);\n  }\n\n  function parseWhile() {\n    const t = expect('while');\n    expect('(');\n    const cond = parseExpression();\n    expect(')');\n    const body = parseBlock();\n    return new AST.While(loc(t), cond, body);\n  }\n\n  function parseDoWhile() {\n    const t = expect('do');\n    const body = parseBlock();\n    expect('while');\n    expect('(');\n    const cond = parseExpression();\n    expect(')');\n    expect(';');\n    return new AST.DoWhile(loc(t), body, cond);\n  }\n\n  function parseSwitch() {\n    const t = expect('switch');\n    expect('(');\n    const value = parseExpression();\n    expect(')');\n    // Body is a regular Block; case/default markers parse as statements\n    // (handled in parseStatement). Fallthrough between cases is natural —\n    // explicit `break;` exits the switch.\n    const body = parseBlock();\n    return new AST.Switch(loc(t), value, body);\n  }\n\n  function parseExpression() {\n    return parseComparison();\n  }\n  function parseComparison() {\n    let left = parseAdd();\n    while (at('==') || at('!=') || at('<') || at('<=') || at('>') || at('>=')) {\n      const op = advance().value;\n      const right = parseAdd();\n      left = new AST.Binary(left.loc, op, left, right);\n    }\n    return left;\n  }\n  function parseAdd() {\n    let left = parseMul();\n    while (at('+') || at('-')) {\n      const op = advance().value;\n      const right = parseMul();\n      left = new AST.Binary(left.loc, op, left, right);\n    }\n    return left;\n  }\n  function parseMul() {\n    let left = parseUnary();\n    while (at('*') || at('/') || at('%')) {\n      const op = advance().value;\n      const right = parseUnary();\n      left = new AST.Binary(left.loc, op, left, right);\n    }\n    return left;\n  }\n  function parseUnary() {\n    if (at('+') || at('-') || at('!')) {\n      const t = advance();\n      const expr = parseUnary();\n      return new AST.Unary(loc(t), t.value, expr);\n    }\n    return parsePrimary();\n  }\n  function parsePrimary() {\n    const t = peek();\n    if (eat('NUM')) return new AST.Literal(loc(t), 'i32', t.value);\n    if (eat('FLOAT')) return new AST.Literal(loc(t), 'f64', t.value);\n    if (eat('ID')) {\n      if (scope[t.value]) return scope[t.value];\n      throw new Error(`Undefined variable ${t.value} at line ${t.line}:${t.col}`);\n    }\n    if (eat('(')) {\n      const e = parseExpression();\n      expect(')');\n      return e;\n    }\n    throw new Error(`Unexpected token ${t?.type} at line ${t?.line}:${t?.col}`);\n  }\n\n  // <type> ID ( [<type> ID, ...] ) <block>\n  function parseFunction() {\n    const start = peek();\n    const retType = parseType();\n    const nameTok = expect('ID');\n    expect('(');\n    const params = [];\n    if (!at(')')) {\n      do {\n        const pType = parseType();\n        const pName = expect('ID');\n        params.push(new AST.Variable(loc(pName), pType, pName.value));\n      } while (eat(','));\n    }\n    expect(')');\n    // Fresh per-function scope, seeded with parameters.\n    scope = Object.create(null);\n    for (const p of params) scope[p.name] = p;\n    const body = parseBlock();\n    return new AST.Function(loc(start), retType, nameTok.value, params, body);\n  }\n\n  const functions = [];\n  while (i < tokens.length) functions.push(parseFunction());\n  return new AST.Program(loc(tokens[0]), functions);\n}",
  "ast-shape": "const AST = (() => {\n\n  class Program {\n    constructor(loc, functions) {\n      this.loc = loc;\n      this.functions = functions;\n    }\n  }\n\n  class Function {\n    constructor(loc, returnType, name, parameters, body) {\n      this.loc = loc;\n      this.returnType = returnType;\n      this.name = name;\n      this.parameters = parameters; // Variable[]\n      this.body = body; // single Block\n    }\n  }\n\n  class Block {\n    constructor(loc, statements) {\n      this.loc = loc;\n      this.statements = statements;\n    }\n  }\n\n  class Literal {\n    constructor(loc, type, value) {\n      this.loc = loc;\n      this.type = type;   // 'i32', 'i64', 'f32', 'f64'\n      this.value = value; // number (for i32/f32/f64) or BigInt (for i64)\n    }\n  }\n\n  class Variable {\n    constructor(loc, type, name) {\n      this.loc = loc;\n      this.type = type; // 'i32', 'i64', 'f32', 'f64'\n      this.name = name;\n    }\n  }\n\n  class Declare {\n    constructor(loc, variable, initializer) {\n      this.loc = loc;\n      this.variable = variable; // Variable\n      this.initializer = initializer; // Expression or null\n    }\n  }\n\n  class Assign {\n    constructor(loc, variable, value) {\n      this.loc = loc;\n      this.variable = variable; // Variable\n      this.value = value; // Expression\n    }\n  }\n\n  // Supported binops:\n  //   +, -, *, /, % (integer and float)\n  //   ==, !=, <, <=, >, >= (integer and float comparisons)\n  class Binary {\n    constructor(loc, op, left, right) {\n      this.loc = loc;\n      this.op = op; // e.g. '+', '-', '*', '/', '==', '<', etc.\n      this.left = left;   // Expression\n      this.right = right; // Expression\n    }\n  }\n\n  class Unary {\n    constructor(loc, op, operand) {\n      this.loc = loc;\n      this.op = op; // e.g. '-', '!'\n      this.operand = operand; // Expression\n    }\n  }\n\n  // Block-bodied switch — cases are inline marker statements within the body\n  // (like Label), not separate Blocks. This makes fallthrough natural and lets\n  // case labels appear inside nested control flow (e.g. Duff's device).\n  class Switch {\n    constructor(loc, value, body) {\n      this.loc = loc;\n      this.value = value; // Expression\n      this.body = body;   // Block (may contain Case markers anywhere)\n    }\n  }\n\n  // Inline marker: `case N:` or `default:`. value === null means default.\n  // Lowered like a Label — each Case marker becomes a BasicBlock target,\n  // and the enclosing Switch emits a dispatch table to those blocks.\n  class Case {\n    constructor(loc, value) {\n      this.loc = loc;\n      this.value = value; // number | null  (null = default)\n    }\n  }\n\n  class If {\n    constructor(loc, cond, thenBlock, elseBlock) {\n      this.loc = loc;\n      this.cond = cond; // Expression\n      this.thenBlock = thenBlock; // Block\n      this.elseBlock = elseBlock; // Block or null\n    }\n  }\n\n  class While {\n    constructor(loc, cond, body) {\n      this.loc = loc;\n      this.cond = cond; // Expression\n      this.body = body; // Block\n    }\n  }\n\n  class DoWhile {\n    constructor(loc, body, cond) {\n      this.loc = loc;\n      this.body = body; // Block\n      this.cond = cond; // Expression\n    }\n  }\n\n  class Break {\n    constructor(loc) {\n      this.loc = loc;\n    }\n  }\n\n  // Just a marker: `name:` in source. Goto targets resolve by walking the\n  // enclosing block. A later lifting pass turns flat labels + gotos into\n  // structured control flow before CODEGEN.emit.\n  class Label {\n    constructor(loc, name) {\n      this.loc = loc;\n      this.name = name; // string (label name)\n    }\n  }\n\n  class Goto {\n    constructor(loc, target) {\n      this.loc = loc;\n      this.target = target; // string (label name)\n    }\n  }\n\n  class Return {\n    constructor(loc, value) {\n      this.loc = loc;\n      this.value = value; // Expression (no void in this language)\n    }\n  }\n\n  const TYPE = (() => {\n    const CMP = new Set(['==', '!=', '<', '<=', '>', '>=']);\n\n    const of = (e) => {\n      if (e instanceof AST.Literal) return e.type;\n      if (e instanceof AST.Variable) return e.type;\n      if (e instanceof AST.Binary) return CMP.has(e.op) ? 'i32' : of(e.left);\n      if (e instanceof AST.Unary) return e.op === '!' ? 'i32' : of(e.operand);\n      throw new Error('AST.TYPE.of: ' + e.constructor.name);\n    };\n\n    return { of };\n  })();\n\n  // ─────────────────────── AST pretty-printer ─────────────────────────\n  //\n  // Renders an AST.Program back to c0 source text. Used by the Lifted tab\n  // to display CFG.intoAST's output as readable source (which the user can\n  // paste back into the editor for re-compilation).\n  function printSource(program) {\n    const PREC = {\n      '||': 1, '&&': 2,\n      '==': 3, '!=': 3, '<': 4, '<=': 4, '>': 4, '>=': 4,\n      '+': 5, '-': 5, '*': 6, '/': 6, '%': 6,\n    };\n\n    const printExpr = (e, parentPrec = 0) => {\n      if (e instanceof AST.Literal) {\n        if (e.type === 'i64') return e.value.toString() + 'L';\n        if (e.type === 'f32') return Number(e.value).toString() + 'f';\n        if (e.type === 'f64') {\n          const s = Number(e.value).toString();\n          return s.includes('.') || s.includes('e') ? s : s + '.0';\n        }\n        return e.value.toString();\n      }\n      if (e instanceof AST.Variable) return e.name;\n      if (e instanceof AST.Unary) {\n        const inner = printExpr(e.operand, 7);\n        return `${e.op}${inner}`;\n      }\n      if (e instanceof AST.Binary) {\n        const p = PREC[e.op] ?? 0;\n        const s = `${printExpr(e.left, p)} ${e.op} ${printExpr(e.right, p + 1)}`;\n        return p < parentPrec ? `(${s})` : s;\n      }\n      throw new Error('printExpr: ' + e?.constructor?.name);\n    };\n\n    const lines = [];\n    const printStmt = (st, ind) => {\n      const pad = '  '.repeat(ind);\n      if (st instanceof AST.Block) {\n        st.statements.forEach((s) => printStmt(s, ind));\n      } else if (st instanceof AST.Declare) {\n        lines.push(`${pad}${st.variable.type} ${st.variable.name}${st.initializer ? ' = ' + printExpr(st.initializer) : ''};`);\n      } else if (st instanceof AST.Assign) {\n        lines.push(`${pad}${st.variable.name} = ${printExpr(st.value)};`);\n      } else if (st instanceof AST.If) {\n        lines.push(`${pad}if (${printExpr(st.cond)}) {`);\n        printStmt(st.thenBlock, ind + 1);\n        if (st.elseBlock) {\n          lines.push(`${pad}} else {`);\n          printStmt(st.elseBlock, ind + 1);\n        }\n        lines.push(`${pad}}`);\n      } else if (st instanceof AST.While) {\n        lines.push(`${pad}while (${printExpr(st.cond)}) {`);\n        printStmt(st.body, ind + 1);\n        lines.push(`${pad}}`);\n      } else if (st instanceof AST.DoWhile) {\n        lines.push(`${pad}do {`);\n        printStmt(st.body, ind + 1);\n        lines.push(`${pad}} while (${printExpr(st.cond)});`);\n      } else if (st instanceof AST.Switch) {\n        lines.push(`${pad}switch (${printExpr(st.value)}) {`);\n        printStmt(st.body, ind + 1);\n        lines.push(`${pad}}`);\n      } else if (st instanceof AST.Case) {\n        const tag = st.value === null ? 'default' : `case ${st.value}`;\n        lines.push(`${pad}${tag}:`);\n      } else if (st instanceof AST.Break) {\n        lines.push(`${pad}break;`);\n      } else if (st instanceof AST.Return) {\n        lines.push(`${pad}return ${printExpr(st.value)};`);\n      } else if (st instanceof AST.Label) {\n        lines.push(`${pad}${st.name}:`);\n      } else if (st instanceof AST.Goto) {\n        lines.push(`${pad}goto ${st.target};`);\n      } else {\n        throw new Error('printStmt: ' + st?.constructor?.name);\n      }\n    };\n\n    const fnLines = program.functions.map((fn) => {\n      lines.length = 0;\n      const params = fn.parameters.map((p) => `${p.type} ${p.name}`).join(', ');\n      lines.push(`${fn.returnType} ${fn.name}(${params}) {`);\n      printStmt(fn.body, 1);\n      lines.push('}');\n      return lines.join('\\n');\n    });\n    return fnLines.join('\\n\\n') + '\\n';\n  }\n\n  return {\n    Program, Function, Block,\n    Literal, Variable,\n    Declare, Assign,\n    Binary, Unary,\n    Switch, Case, If, While, DoWhile, Break,\n    Label, Goto, Return,\n    TYPE, printSource,\n  };\n})();",
  "cfg-shape": "const CFG = (() => {\n\n  // ────── Statement-CFG ──────\n  //\n  // Each BasicBlock holds a straight-line list of AST.Assign statements\n  // (mutations to declared locals); branching lives in the terminator.\n  // Expressions stay as AST trees — no stack-machine ops, no SSA, no\n  // value-naming. Function locals are tracked at the Function level\n  // (Declare nodes from the source contribute their AST.Variable here\n  // and their initializer becomes an Assign at the point of declaration).\n\n  // ────── Terminators ──────\n  //\n  // BrIf and Return carry full AST.Expression trees as cond / value.\n\n  class Terminator {\n    constructor(loc) { this.loc = loc; }\n    get successors() { return []; }\n  }\n\n  class Br extends Terminator {\n    constructor(loc, target) {\n      if (!(target instanceof BasicBlock)) throw new Error('Br: target must be a BasicBlock');\n      super(loc);\n      this.target = target;\n    }\n    get successors() { return [this.target]; }\n  }\n\n  class BrIf extends Terminator {\n    constructor(loc, cond, trueTarget, falseTarget) {\n      if (!(trueTarget instanceof BasicBlock) || !(falseTarget instanceof BasicBlock)) {\n        throw new Error('BrIf: targets must be BasicBlocks');\n      }\n      super(loc);\n      this.cond = cond;                  // AST.Expression\n      this.trueTarget = trueTarget;\n      this.falseTarget = falseTarget;\n    }\n    get successors() { return [this.trueTarget, this.falseTarget]; }\n  }\n\n  class Return extends Terminator {\n    constructor(loc, value) {\n      super(loc);\n      this.value = value;                // AST.Expression\n    }\n  }\n\n  class Unreachable extends Terminator {\n    constructor(loc) { super(loc); }\n  }\n\n  // ────── BasicBlock / Function / Module ──────\n\n  class BasicBlock {\n    constructor(name) {\n      this.name = name;\n      this.id = -1;\n      this.statements = [];              // AST.Assign[] — straight-line only\n      this.terminator = null
