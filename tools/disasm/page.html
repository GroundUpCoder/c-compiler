<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WASM Disassembler</title>
<style>
:root {
  --bg: #1e1e2e;
  --surface: #181825;
  --overlay: #11111b;
  --text: #cdd6f4;
  --subtext: #a6adc8;
  --blue: #89b4fa;
  --green: #a6e3a1;
  --red: #f38ba8;
  --yellow: #f9e2af;
  --mauve: #cba6f7;
  --teal: #94e2d5;
  --peach: #fab387;
  --border: #313244;
  --accent: #89b4fa;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; }

.toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.toolbar h1 { font-size: 15px; font-weight: 600; color: var(--blue); margin-right: auto; }
.toolbar button {
  padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--overlay); color: var(--text); cursor: pointer; font-size: 13px;
  transition: background 0.15s;
}
.toolbar button:hover { background: var(--border); }
.toolbar button.primary { background: var(--accent); color: var(--overlay); border-color: var(--accent); font-weight: 600; }
.toolbar button.primary:hover { opacity: 0.9; }
.toolbar .status { font-size: 12px; color: var(--subtext); }

.layout { display: flex; flex: 1; overflow: hidden; }
.layout.stacked { flex-direction: column; }
.layout.side-by-side { flex-direction: row; }

.pane {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  min-width: 0; min-height: 0;
}
.pane-header {
  padding: 6px 12px; background: var(--surface); border-bottom: 1px solid var(--border);
  font-size: 12px; font-weight: 600; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.5px;
  flex-shrink: 0;
}
.side-by-side .pane + .pane { border-left: 1px solid var(--border); }
.stacked .pane + .pane { border-top: 1px solid var(--border); }

.editor-wrap { flex: 1; overflow: hidden; position: relative; }
.editor-wrap textarea {
  width: 100%; height: 100%; resize: none; border: none; outline: none;
  background: var(--overlay); color: var(--text); padding: 12px;
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
  font-size: 13px; line-height: 1.5; tab-size: 4;
}

.disasm-wrap { flex: 1; overflow-y: auto; padding: 8px 0; background: var(--overlay); }
.disasm-wrap::-webkit-scrollbar { width: 8px; }
.disasm-wrap::-webkit-scrollbar-track { background: transparent; }
.disasm-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.disasm-empty { padding: 24px; color: var(--subtext); text-align: center; font-size: 13px; }
.disasm-empty kbd {
  padding: 2px 6px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 3px; font-family: inherit; font-size: 12px;
}
.disasm-error { padding: 12px 16px; color: var(--red); font-size: 13px; white-space: pre-wrap; font-family: monospace; }

.section-group { margin-bottom: 2px; }
.section-group summary {
  padding: 6px 12px; cursor: pointer; font-family: monospace; font-size: 13px;
  list-style: none; display: flex; align-items: center; gap: 8px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  user-select: none; transition: background 0.1s;
}
.section-group summary:hover { background: var(--border); }
.section-group summary::before {
  content: '\25B6'; font-size: 9px; color: var(--subtext);
  transition: transform 0.15s; display: inline-block; width: 12px;
}
.section-group[open] > summary::before { transform: rotate(90deg); }
.section-group summary .fn-name { color: var(--blue); font-weight: 600; }
.section-group summary .fn-sig { color: var(--subtext); font-size: 12px; }
.section-group summary .fn-meta { color: var(--subtext); font-size: 11px; margin-left: auto; }
.fn-group > .section-group > summary { padding-left: 28px; }

.insn-list { font-family: monospace; font-size: 12px; line-height: 1.6; }
.insn {
  display: flex; padding: 1px 12px 1px 0; transition: background 0.1s;
}
.insn:hover { background: rgba(137, 180, 250, 0.06); }
.insn-offset { color: var(--subtext); width: 70px; text-align: right; padding-right: 12px; flex-shrink: 0; user-select: none; }
.insn-text { white-space: pre; }
.insn-op { color: var(--mauve); }
.insn-op.control { color: var(--red); }
.insn-op.memory { color: var(--green); }
.insn-op.local { color: var(--teal); }
.insn-op.global { color: var(--yellow); }
.insn-op.const { color: var(--peach); }
.insn-op.call { color: var(--blue); font-weight: 600; }
.insn-imm { color: var(--text); }
.insn-name { color: var(--subtext); }

.meta-section { padding: 8px 12px; font-family: monospace; font-size: 12px; }
.meta-section h3 { color: var(--blue); font-size: 12px; margin-bottom: 4px; }
.meta-row { color: var(--subtext); padding: 1px 0; }
.meta-row .kind { color: var(--mauve); }
.meta-row .name { color: var(--text); }

.app { display: flex; flex-direction: column; height: 100vh; }

.var-list { font-family: monospace; font-size: 12px; line-height: 1.6; padding: 2px 0; }
.var-row {
  display: flex; padding: 2px 12px; transition: background 0.1s; cursor: default;
}
.var-row .var-idx { color: var(--subtext); width: 70px; text-align: right; padding-right: 12px; flex-shrink: 0; }
.var-row .var-type { color: var(--mauve); width: 40px; }
.var-row .var-name { color: var(--teal); font-weight: 600; }
.var-row:hover { background: rgba(137, 180, 250, 0.06); }
.hl-local { background: rgba(148, 226, 213, 0.12) !important; }

.settings-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100;
  align-items: center; justify-content: center;
}
.settings-overlay.open { display: flex; }
.settings-panel {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 20px 24px; min-width: 320px; max-width: 420px;
}
.settings-panel h2 { font-size: 14px; color: var(--blue); margin-bottom: 12px; }
.settings-panel label {
  display: flex; align-items: center; gap: 8px; padding: 6px 0;
  font-size: 13px; cursor: pointer; color: var(--text);
}
.settings-panel label input { accent-color: var(--accent); }
.settings-panel .setting-desc { font-size: 11px; color: var(--subtext); margin-left: 24px; margin-bottom: 4px; }
.settings-panel .btn-row { margin-top: 14px; text-align: right; }
.settings-panel button {
  padding: 6px 16px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--accent); color: var(--overlay); cursor: pointer; font-size: 13px; font-weight: 600;
}

@media (max-width: 768px) {
  .layout.side-by-side { flex-direction: column; }
}
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <h1>WASM Disassembler</h1>
    <span class="status" id="status">Loading...</span>
    <button id="btnCompile" class="primary" disabled>Compile &amp; Disassemble</button>
    <button id="btnSettings" title="Settings">&#x2699;</button>
    <button id="btnLayout" title="Toggle layout">&#x2B1A;</button>
  </div>
  <div class="layout side-by-side" id="layout">
    <div class="pane">
      <div class="pane-header">C Source</div>
      <div class="editor-wrap">
        <textarea id="editor" spellcheck="false">int factorial(int n) {
    if (n <= 1) return 1;
    return n * factorial(n - 1);
}

int fibonacci(int n) {
    int a = 0, b = 1;
    for (int i = 0; i < n; i++) {
        int t = a + b;
        a = b;
        b = t;
    }
    return a;
}

int main(void) {
    return factorial(10) + fibonacci(20);
}
</textarea>
      </div>
    </div>
    <div class="pane">
      <div class="pane-header">Disassembly</div>
      <div class="disasm-wrap" id="disasmWrap">
        <div class="disasm-empty">Press <kbd>Compile &amp; Disassemble</kbd> or <kbd>Ctrl+Enter</kbd> to see output</div>
      </div>
    </div>
  </div>
</div>

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <h2>Compiler Settings</h2>
    <label><input type="checkbox" id="optNoReuseLocals"> Disable local slot reuse</label>
    <div class="setting-desc">Each variable gets its own WASM local (no sharing across scopes)</div>
    <label><input type="checkbox" id="optGcSections"> GC unused sections</label>
    <div class="setting-desc">Remove unreferenced functions and data</div>
    <div class="btn-row"><button id="btnSettingsClose">Done</button></div>
  </div>
</div>

<!-- Compiler (injected by build.py) -->
<script>/* __COMPILER_JS__ */</script>

<script>

var DISW_WASM_BASE64 = '__DISW_WASM_BASE64__';

// Minimal WASM host for running disw
async function createDiswRunner(wasmBytes) {

  var latin1Decoder = new TextDecoder('latin1');

    var bytes = new Uint8Array(instance.exports.memory.buffer);

// Compiler
function getCompilerOptions() {
  var opts = { emitNames: true };
  if (document.getElementById('optNoReuseLocals').checked) opts.noReuseLocals = true;
  if (document.getElementById('optGcSections').checked) opts.gcSections = true;
  return opts;
}

function compileC(source) {
  var C = self.CompilerJS;
  var pp = C.createDefaultPPRegistry();
  var errors = [];
  var vfs = {
    readFileSync: function(f) {
      if (f === 'input.c') return source;
      throw new Error('File not found: ' + f);
    }
  };
  var opts = getCompilerOptions();
  var units;
  try {
    units = C.parseAllUnits(vfs, pp, ['input.c'], {
      compilerOptions: opts,
      warningFlags: {},
      writeErr: function(s) { errors.push(s); },
    });
  } catch (e) {
    throw new Error(errors.length > 0 ? errors.join('') : e.message);
  }
  var linkResult = C.linkTranslationUnits(units, {});
  if (linkResult.errors.length > 0) {
    throw new Error(linkResult.errors.map(function(e) { return e.message; }).join('\n'));
  }
  return C.generateCode(units, 'output.wasm', { compilerOptions: opts });
}

// Rendering
function classifyOp(text) {
  if (/^(block|loop|if|else|end|br|return|unreachable|nop)\b/.test(text)) return 'control';
  if (text.startsWith('call')) return 'call';
  if (/^[if](32|64)\.(load|store)/.test(text) || text.startsWith('memory.')) return 'memory';
  if (text.startsWith('local.')) return 'local';
  if (text.startsWith('global.')) return 'global';
  if (text.indexOf('.const ') >= 0) return 'const';
  return '';
}

function renderInsn(insn, funcIdx) {
  var parts = insn.text.match(/^(\S+)(.*)/);
  if (!parts) return '';
  var op = parts[1];
  var rest = parts[2] || '';
  var cls = classifyOp(insn.text);
  var indent = '  '.repeat(insn.depth);

  var immHtml = '';
  if (rest) {
    var escaped = rest.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    immHtml = escaped.replace(/&lt;([^&]*)&gt;/g, '<span class="insn-name">&lt;$1&gt;</span>');
  }

  var localAttr = '';
  if (op === 'local.get' || op === 'local.set' || op === 'local.tee') {
    var m = rest.match(/^\s*(\d+)/);
    if (m) localAttr = ' data-local="' + funcIdx + ':' + m[1] + '"';
  }

  return '<div class="insn"' + localAttr + '>' +
    '<span class="insn-offset">' + insn.offset.toString(16).padStart(6, '0') + '</span>' +
    '<span class="insn-text">' + indent +
    '<span class="insn-op ' + cls + '">' + op + '</span>' +
    '<span class="insn-imm">' + immHtml + '</span>' +
    '</span></div>';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderJson(json) {
  var wrap = document.getElementById('disasmWrap');
  var html = '';

  html += '<details class="section-group" open><summary>';
  html += '<span class="fn-name">Module</span>';
  html += '<span class="fn-meta">version ' + json.version + ', ' + json.sections.length + ' sections</span>';
  html += '</summary><div class="meta-section">';
  for (var si = 0; si < json.sections.length; si++) {
    var s = json.sections[si];
    html += '<div class="meta-row"><span class="kind">' + s.name + '</span>';
    html += ' offset=0x' + s.offset.toString(16) + ' size=' + s.size;
    if (s.count !== undefined) html += ' count=' + s.count;
    html += '</div>';
  }
  html += '</div></details>';

  if (json.imports.length > 0) {
    html += '<details class="section-group"><summary>';
    html += '<span class="fn-name">Imports</span>';
    html += '<span class="fn-meta">' + json.imports.length + ' entries</span>';
    html += '</summary><div class="meta-section">';
    for (var ii = 0; ii < json.imports.length; ii++) {
      var im = json.imports[ii];
      html += '<div class="meta-row"><span class="kind">' + im.kind + '</span> ';
      html += '<span class="name">' + esc(im.module) + '.' + esc(im.name) + '</span>';
      if (im.type_index !== undefined) html += ' sig=' + im.type_index;
      html += '</div>';
    }
    html += '</div></details>';
  }

  if (json.exports.length > 0) {
    html += '<details class="section-group"><summary>';
    html += '<span class="fn-name">Exports</span>';
    html += '<span class="fn-meta">' + json.exports.length + ' entries</span>';
    html += '</summary><div class="meta-section">';
    for (var ei = 0; ei < json.exports.length; ei++) {
      var ex = json.exports[ei];
      html += '<div class="meta-row"><span class="kind">' + ex.kind + '</span> ';
      html += '<span class="name">' + esc(ex.name) + '</span> -&gt; [' + ex.index + ']</div>';
    }
    html += '</div></details>';
  }

  if (json.globals.length > 0) {
    html += '<details class="section-group"><summary>';
    html += '<span class="fn-name">Globals</span>';
    html += '<span class="fn-meta">' + json.globals.length + ' entries</span>';
    html += '</summary><div class="meta-section">';
    for (var gi = 0; gi < json.globals.length; gi++) {
      var g = json.globals[gi];
      html += '<div class="meta-row">[' + g.index + '] <span class="kind">' + g.val_type + '</span> ' + (g.mutable ? 'mut' : 'const');
      if (g.name) html += ' <span class="name">' + esc(g.name) + '</span>';
      html += '</div>';
    }
    html += '</div></details>';
  }

  if (json.code.length > 0) {
    var totalInsns = json.code.reduce(function(s, f) { return s + f.instructions.length; }, 0);
    html += '<details class="section-group"><summary>';
    html += '<span class="fn-name">Code</span>';
    html += '<span class="fn-meta">' + json.code.length + ' functions, ' + totalInsns + ' instructions</span>';
    html += '</summary><div class="code-group">';
    for (var fi = 0; fi < json.code.length; fi++) {
      var fn = json.code[fi];
      var name = fn.name || ('func[' + fn.index + ']');
      var sig = fn.signature || '';
      var nInsns = fn.instructions.length;

      html += '<details class="section-group fn-group">';
      html += '<summary>';
      html += '<span class="fn-name">' + esc(name) + '</span>';
      html += '<span class="fn-sig">' + esc(sig) + '</span>';
      html += '<span class="fn-meta">' + nInsns + ' insns, ' + fn.body_size + ' bytes';
      var totalVars = (fn.params ? fn.params.length : 0) + fn.locals.length;
      if (totalVars > 0) html += ', ' + totalVars + ' variables';
      html += '</span></summary>';
      if (totalVars > 0) {
        html += '<details class="section-group"><summary>';
        html += '<span class="fn-name">Variables</span>';
        html += '<span class="fn-meta">';
        if (fn.params && fn.params.length > 0) html += fn.params.length + ' params';
        if (fn.params && fn.params.length > 0 && fn.locals.length > 0) html += ', ';
        if (fn.locals.length > 0) html += fn.locals.length + ' locals';
        html += '</span></summary><div class="var-list">';
        if (fn.params) {
          for (var pi = 0; pi < fn.params.length; pi++) {
            var p = fn.params[pi];
            html += '<div class="var-row" data-local="' + fn.index + ':' + p.index + '">';
            html += '<span class="var-idx">' + p.index + '</span>';
            html += '<span class="var-type">' + esc(p.type) + '</span>';
            html += '<span class="var-name">' + (p.name ? esc(p.name) : '') + '</span>';
            html += '</div>';
          }
        }
        for (var li = 0; li < fn.locals.length; li++) {
          var l = fn.locals[li];
          html += '<div class="var-row" data-local="' + fn.index + ':' + l.index + '">';
          html += '<span class="var-idx">' + l.index + '</span>';
          html += '<span class="var-type">' + esc(l.type) + '</span>';
          html += '<span class="var-name">' + (l.name ? esc(l.name) : '') + '</span>';
          html += '</div>';
        }
        html += '</div></details>';
      }
      html += '<div class="insn-list">';
      for (var ii2 = 0; ii2 < fn.instructions.length; ii2++) {
        html += renderInsn(fn.instructions[ii2], fn.index);
      }
      html += '</div></details>';
    }
    html += '</div></details>';
  }

  wrap.innerHTML = html;
}

// Main
var diswRunner = null;
var statusEl = document.getElementById('status');

async function init() {
  try {
    var raw = atob(DISW_WASM_BASE64);
    var diswBytes = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) diswBytes[i] = raw.charCodeAt(i);
    diswRunner = await createDiswRunner(diswBytes);
    document.getElementById('btnCompile').disabled = false;
    statusEl.textContent = 'Ready';
  } catch (e) {
    statusEl.textContent = 'Error: ' + e.message;
    console.error(e);
  }
}

async function doCompile() {
  var btn = document.getElementById('btnCompile');
  var source = document.getElementById('editor').value;
  btn.disabled = true;
  statusEl.textContent = 'Compiling...';

  try {
    var t0 = performance.now();
    var wasm = compileC(source);
    var compileMs = (performance.now() - t0).toFixed(0);

    statusEl.textContent = 'Disassembling...';
    var t1 = performance.now();
    var jsonStr = diswRunner(wasm);
    var disasmMs = (performance.now() - t1).toFixed(0);

    var json = JSON.parse(jsonStr);
    renderJson(json);

    var totalFns = json.code.length;
    var totalInsns = json.code.reduce(function(s, f) { return s + f.instructions.length; }, 0);
    statusEl.textContent = totalFns + ' functions, ' + totalInsns + ' instructions (' + compileMs + 'ms compile, ' + disasmMs + 'ms disasm)';
  } catch (e) {
    var wrap = document.getElementById('disasmWrap');
    wrap.innerHTML = '<div class="disasm-error">' + esc(e.message || String(e)) + '</div>';
    statusEl.textContent = 'Error';
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

var isStacked = false;
document.getElementById('btnLayout').addEventListener('click', function() {
  isStacked = !isStacked;
  document.getElementById('layout').className = 'layout ' + (isStacked ? 'stacked' : 'side-by-side');
});

document.getElementById('editor').addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    doCompile();
  }
});

document.getElementById('btnCompile').addEventListener('click', doCompile);

var disasmWrap = document.getElementById('disasmWrap');
var hlElements = [];
disasmWrap.addEventListener('mouseover', function(e) {
  var el = e.target.closest('[data-local]');
  if (!el) return;
  var key = el.getAttribute('data-local');
  hlElements = disasmWrap.querySelectorAll('[data-local="' + key + '"]');
  for (var i = 0; i < hlElements.length; i++) hlElements[i].classList.add('hl-local');
});
disasmWrap.addEventListener('mouseout', function(e) {
  var el = e.target.closest('[data-local]');
  if (!el) return;
  for (var i = 0; i < hlElements.length; i++) hlElements[i].classList.remove('hl-local');
  hlElements = [];
});

var settingsOverlay = document.getElementById('settingsOverlay');
document.getElementById('btnSettings').addEventListener('click', function() {
  settingsOverlay.classList.add('open');
});
document.getElementById('btnSettingsClose').addEventListener('click', function() {
  settingsOverlay.classList.remove('open');
});
settingsOverlay.addEventListener('click', function(e) {
  if (e.target === settingsOverlay) settingsOverlay.classList.remove('open');
});

init();
</script>
